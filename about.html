<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 Rene</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 35px 25px; 
            border-radius: 24px; 
            max-width: 400px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
        }
        .header { text-align: center; margin-bottom: 25px; }
        .avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }
        .title { font-size: 24px; color: #2d3748; margin: 10px 0 5px 0; font-weight: 800; }
        .subtitle { font-size: 14px; color: #9f7aea; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        .intro-text {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 25px;
            padding: 0 10px;
            font-weight: 500;
        }

        .profile-list { margin-bottom: 25px; text-align: left; }
        .profile-item {
            background: rgba(255, 255, 255, 0.6);
            padding: 12px 15px;
            border-radius: 14px;
            margin-bottom: 10px;
            border-left: 5px solid #667eea;
        }
        .label { font-size: 12px; color: #a0aec0; font-weight: bold; margin-bottom: 4px; display: block; }
        .value { font-size: 14px; color: #2d3748; font-weight: 600; line-height: 1.4; }

        .social-section {
            margin-bottom: 30px;
            border-top: 1px dashed #e2e8f0;
            padding-top: 20px;
        }
        .social-title {
            font-size: 13px;
            color: #718096;
            font-weight: bold;
            margin-bottom: 12px;
            text-align: center;
        }
        .social-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            font-family: inherit;
        }
        .social-btn:hover { transform: translateY(-2px); opacity: 0.9; }
        
        .btn-dy { background: #1c1c1e; box-shadow: 0 4px 12px rgba(28,28,30,0.2); }
        .btn-ig { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); box-shadow: 0 4px 12px rgba(220,39,67,0.2); }
        .btn-wx { background: #07c160; box-shadow: 0 4px 12px rgba(7,193,96,0.2); }
        
        /* 📞 完美复刻：苹果原装电话绿色图标样式 */
        .btn-tel { background: #34C759; box-shadow: 0 4px 12px rgba(52,199,89,0.3); }

        .btn-back { 
            display: block; padding: 14px; background: #4a5568; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-align: center; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2); transition: all 0.2s ease;
        }
        .btn-back:hover { background: #2d3748; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <img src="toto01.JPG" alt="头像" class="avatar">

        <div class="header">
            <div class="subtitle">Personal Files</div>
            <div class="title">Rene 的绝密档案 💾</div>
        </div>

        <p class="intro-text">
            📱 100% 独立，完完全全属于我自己。<br>在这里记录生活，探索更有趣的世界。
        </p>

        <div class="profile-list">
            <div class="profile-item">
                <span class="label">😎 江湖外号</span>
                <span class="value">香港彭于晏（自封的，但由于长得太帅，目前仅一人反驳）</span>
            </div>
            <div class="profile-item">
                <span class="label">⚡ 特殊超能力</span>
                <span class="value">拥有只靠前奏就能精准识别全网所有歌曲的绝对音感。（假的嘻嘻 其实我单曲循环的列表里只有方大同和卢广仲 🎧）</span>
            </div>
            <div class="profile-item">
                <span class="label">🧠 每日精神状态</span>
                <span class="value">😴😴😩😩🫨🫨😪😪</span>
            </div>
        </div>

        <div class="social-section">
            <div class="social-title">🌐 偶遇 Rene 的其他地方</div>
            <div class="social-grid">
                <a href="https://v.douyin.com/7PCp3ci9wo0/" target="_blank" class="social-btn btn-dy">🎵 戳这里看我的抖音作品</a>
                <a href="https://instagram.com/rr987604" target="_blank" class="social-btn btn-ig">📸 关注我的 Instagram (rr987604)</a>
                <button onclick="copyWeChat()" class="social-btn btn-wx">💬 点击一键复制微信好友</button>
                <!-- 📞 苹果原装电话绿按钮 -->
                <a href="tel:+85262139118" class="social-btn btn-tel">📞 拨打我的电话：+852 62139118</a>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

    <script>
        function copyWeChat() {
            const wxId = '987604';
            navigator.clipboard.writeText(wxId).then(() => {
                alert('🎉 微信账号 ' + wxId + ' 已成功复制！快去微信添加好友吧~');
            }).catch(err => {
                alert('复制失败，请手动添加微信号：' + wxId);
            });
        }
    </script>

</body>
</html>
