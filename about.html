<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于 Rene</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .container { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 24px; 
            max-width: 400px; 
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .title {
            font-size: 24px;
            color: #2d3748;
            margin: 10px 0 5px 0;
            font-weight: 800;
        }
        .subtitle {
            font-size: 14px;
            color: #9f7aea;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        /* 奇奇怪怪的档案列表样式 */
        .profile-list {
            margin-bottom: 30px;
        }
        .profile-item {
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 14px;
            margin-bottom: 12px;
            border-left: 5px solid #667eea;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .label {
            font-size: 12px;
            color: #a0aec0;
            font-weight: bold;
            margin-bottom: 4px;
            display: block;
        }
        .value {
            font-size: 15px;
            color: #2d3748;
            font-weight: 600;
            line-height: 1.4;
        }
        /* 底部返回按钮 */
        .btn-back { 
            display: block; 
            padding: 14px; 
            background: #4a5568; 
            color: white; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: 600; 
            font-size: 15px;
            text-align: center;
            box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2);
            transition: all 0.2s ease;
        }
        .btn-back:hover { 
            background: #2d3748; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="subtitle">Personal Files</div>
            <div class="title">Rene 的绝密档案 💾</div>
        </div>

        <div class="profile-list">
            <div class="profile-item">
                <span class="label">😎 江湖外号</span>
                <span class="value">香港彭于晏（自封的，但由于长得太帅，目前没人敢反驳）</span>
            </div>

            <div class="profile-item">
                <span class="label">⚡ 特殊超能力</span>
                <span class="value">能在 0.5 秒内精准识别出哪首是卢广仲的吉他前奏。</span>
            </div>

            <div class="profile-item">
                <span class="label">🧠 每日精神状态</span>
                <span class="value">一边高喊着“一定要相信自己”，一边在床上赖床半小时。</span>
            </div>

            <div class="profile-item">
                <span class="label">🌟 终极梦想</span>
                <span class="value">把这个独立网页做成全网最酷的存在，然后惊艳所有人。</span>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

</body>
</html>
