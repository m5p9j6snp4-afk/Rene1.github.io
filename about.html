<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>關於 Rene</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-blue: #5096ff;
            --bg-dark: #1c1f26;
            --card-bg: #272b35;
            --text: #f1f3f9;
            --text-gray: #a0a8b8;
            --border: rgba(80,150,255,0.2);
            --warn: #ff7777;
        }
        *{margin:0;padding:0;box-sizing:border-box;}
        body {
            font-family: "Noto Sans SC", "Montserrat", sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            border:1px solid var(--border);
            padding:32px 26px;
            border-radius:16px;
            max-width:440px;
            width:100%;
        }
        .header {text-align:center;margin-bottom:22px;}
        .title { font-size:22px; color:var(--text); margin:8px 0 4px; font-weight:500; }
        .subtitle { font-size:13px; color:var(--main-blue); letter-spacing:1px; }

        .intro-text {
            color:var(--text-gray);
            font-size:15px;
            line-height:1.6;
            text-align:center;
            margin-bottom:24px;
        }
        .profile-list {margin-bottom:24px;}
        .profile-item {
            background:rgba(0,0,0,.22);
            border:1px solid var(--border);
            padding:12px 15px;
            border-radius:12px;
            margin-bottom:10px;
        }
        .label {font-size:12px;color:var(--main-blue);display:block;margin-bottom:4px;}
        .value {font-size:14px;color:var(--text);line-height:1.4;}

        .social-section {
            margin:26px 0;
            border-top:1px dashed var(--border);
            padding-top:20px;
        }
        .social-title {
            text-align:center;
            font-size:13px;
            color:var(--text-gray);
            margin-bottom:14px;
        }
        .social-grid {display:flex;flex-direction:column;gap:11px;}
        .social-btn {
            padding:13px;
            border-radius:12px;
            border:1px solid var(--border);
            background:transparent;
            color:var(--text);
            text-decoration:none;
            text-align:center;
            font-size:14px;
            transition:.24s;
            cursor:pointer;
        }
        .social-btn:hover {background:rgba(80,150,255,.07);border-color:var(--main-blue);}
        .btn-back {
            display:block;
            padding:13px;
            border-radius:12px;
            border:1px solid var(--border);
            color:var(--text-gray);
            text-decoration:none;
            text-align:center;
            transition:.24s;
        }
        .btn-back:hover {background:rgba(80,150,255,.07);border-color:var(--main-blue);color:var(--text);}
    </style>
    <!-- 登录权限拦截 -->
    <script>
        if(localStorage.getItem("siteLogin") !== "ok"){
            location.href = "index.html";
        }
    </script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="subtitle">Personal Files</div>
            <div class="title">Rene 的絕密檔案 💾</div>
        </div>

        <p class="intro-text">
            📱 100% 獨立，完完全全屬於我自己。<br>在這裡記錄生活，探索更有趣的世界。
        </p>

        <div class="profile-list">
            <div class="profile-item">
                <span class="label">😎 江湖外號</span>
                <span class="value">香港彭于晏（自封的，但由於長得太帥，目前僅一人反駁）</span>
            </div>
            <div class="profile-item">
                <span class="label">⚡ 特殊超能力</span>
                <span class="value">擁有只靠前奏就能精準識別全網所有歌曲的絕對音感。（假的嘻嘻 其實我單曲循環的列表裡只有方大同和盧廣仲 🎧）</span>
            </div>
            <div class="profile-item">
                <span class="label">🧠 每日精神狀態</span>
                <span class="value">😴😴😩😩🫨🫨😪😪</span>
            </div>
        </div>

        <div class="social-section">
            <div class="social-title">🌐 偶遇 Rene 的其他地方</div>
            <div class="social-grid">
                <a href="https://v.douyin.com/7PCp3ci9wo0/" target="_blank" class="social-btn">🎵 戳這裡看我的抖音作品</a>
                <a href="https://instagram.com/rr987604" target="_blank" class="social-btn">📸 關注我的 Instagram (rr987604)</a>
                <button onclick="copyWeChat()" class="social-btn">💬 點擊一鍵複製微信好友</button>
                <a href="tel:+85262139118" class="social-btn">📞 撥打我的電話：+852 62139118</a>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主頁</a>
    </div>

    <script>
        function copyWeChat() {
            const wxId = '987604';
            navigator.clipboard.writeText(wxId).then(() => {
                alert('🎉 微信帳號 ' + wxId + ' 已成功複製!快去微信添加好友吧~');
            }).catch(err => {
                alert('複製失敗，請手動添加微信號：' + wxId);
            });
        }
    </script>
</body>
</html>
