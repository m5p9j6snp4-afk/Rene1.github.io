<!DOCTYPE html>
<html>
<head>
    <title>俄罗斯方块</title>
    <style>
        body { background: #1a1a1a; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; font-family: sans-serif; }
        /* 画面变大，适应手机 */
        canvas { border: 4px solid #fff; background: #000; width: 300px; height: 500px; }
        .controls { margin-top: 20px; display: flex; gap: 15px; }
        button { padding: 15px 30px; font-size: 20px; border-radius: 10px; border: none; background: #576b95; color: white; cursor: pointer; }
        #score { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="score">分數: 0</div>
    <canvas id="tetris" width="120" height="200"></canvas>
    <div class="controls">
        <button onclick="playerMove(-1)">⬅️</button>
        <button onclick="playerRotate()">🔄</button>
        <button onclick="playerMove(1)">➡️</button>
    </div>
    <a href="index.html" style="margin-top: 20px; color: #888; text-decoration: none;">返回主頁</a>

<script>
const canvas = document.getElementById('tetris');
const ctx = canvas.getContext('2d');
ctx.scale(10, 10); // 坐标比例

// 【速度控制】数字越小速度越快！现在是 500ms 下落一次
const DROP_SPEED = 500; 

function arenaSweep() {
    let rowCount = 1;
    outer: for (let y = arena.length - 1; y > 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
            if (arena[y][x] === 0) continue outer;
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        ++y;
        player.score += rowCount * 10;
        rowCount *= 2;
    }
    document.getElementById('score').innerText = "分数: " + player.score;
}

function collide(arena, player) {
    const [m, o] = [player.matrix, player.pos];
    for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
            if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
        }
    }
    return false;
}

function createMatrix(w, h) { return Array.from({length: h}, () => Array(w).fill(0)); }

function draw() {
    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
    drawMatrix(arena, {x: 0, y: 0});
    drawMatrix(player.matrix, player.pos);
}

function drawMatrix(matrix, offset) {
    matrix.forEach((row, y) => row.forEach((val, x) => {
        if (val !== 0) { ctx.fillStyle = 'red'; ctx.fillRect(x + offset.x, y + offset.y, 0.9, 0.9); }
    }));
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => row.forEach((val, x) => {
        if (val !== 0) arena[y + player.pos.y][x + player.pos.x] = val;
    }));
}

function playerDrop() {
    player.pos.y++;
    if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
    }
    dropCounter = 0;
}

function playerMove(dir) {
    player.pos.x += dir;
    if (collide(arena, player)) player.pos.x -= dir;
}

function playerRotate() {
    player.matrix = player.matrix[0].map((_, i) => player.matrix.map(row => row[i]).reverse());
    if (collide(arena, player)) player.pos.x -= 0; // 简化版旋转修正
}

function playerReset() {
    const pieces = 'ILJOTSZ';
    player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
    player.pos.y = 0; player.pos.x = 4;
    if (collide(arena, player)) arena.forEach(row => row.fill(0));
}

function createPiece(type) {
    if (type === 'T') return [[0,1,0],[1,1,1],[0,0,0]];
    if (type === 'O') return [[2,2],[2,2]];
    if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
    if (type === 'I') return [[0,4,0,0],[0,4,0,0],[0,4,0,0],[0,4,0,0]];
    return [[0,0,0],[1,1,1],[0,1,0]];
}

const arena = createMatrix(12, 20);
const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

let dropCounter = 0; let lastTime = 0;
function update(time = 0) {
    const deltaTime = time - lastTime;
    lastTime = time;
    dropCounter += deltaTime;
    if (dropCounter > DROP_SPEED) playerDrop(); // 使用刚才定义的 DROP_SPEED
    draw();
    requestAnimationFrame(update);
}

playerReset();
update();
</script>
</body>
</html>
