<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene's Moments</title>
    <!-- 保留你之前的 CSS 样式 -->
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; padding: 20px; }
        .container { max-width: 480px; margin: 0 auto; }
        .moment-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .moment-img { width: 150px; height: 150px; object-fit: cover; border-radius: 6px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <!-- 这是你之前的朋友圈卡片内容 -->
    <div class="moment-card">
        <h3>我的朋友圈动态</h3>
        <p>这里是你之前的照片或内容...</p>
        <img src="你的图片.jpg" class="moment-img" onerror="this.style.display='none'">
        
        <!-- 1. 挂载点：评论区的位置 -->
        <div id="fastcomments-widget"></div>
    </div>
</div>

<!-- 2. 引入脚本 -->
<script src="https://cdn.fastcomments.com/js/embed-v2.min.js"></script>

<!-- 3. 初始化评论系统 -->
<script>
    window.FastCommentsUI(document.getElementById('fastcomments-widget'), {
        tenantId: 'pbN5Owiw1B1'
    });
</script>

</body>
</html>
