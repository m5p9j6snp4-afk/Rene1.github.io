<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的朋友圈</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            max-width: 450px; 
            width: 100%;
        }
        .header {
            text-align: center;
            margin: 20px 0 30px 0;
            color: white;
        }
        .header-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }
        .title { font-size: 24px; font-weight: 800; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .moment-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .moment-time {
            font-size: 13px;
            color: #8a99ad;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }
        .moment-content {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        /* 📸 完美复刻：正宗微信朋友圈灰色互动卡片区（0报错，超稳定） */
        .wx-comment-box {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 10px 12px;
            margin-top: 15px;
            font-size: 14px;
        }
        /* 朋友圈经典点赞爱心列表 */
        .wx-likes {
            color: #576b95;
            font-weight: 600;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }
        .wx-comment-item {
            line-height: 1.5;
            margin-bottom: 4px;
        }
        .wx-comment-item:last-child {
            margin-bottom: 0;
        }
        /* 朋友圈经典名字蓝色 */
        .wx-user {
            color: #576b95;
            font-weight: 600;
        }
        .wx-text {
            color: #111111;
        }

        .btn-back { 
            display: block; padding: 14px; background: #4a5568; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-align: center; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2); transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-back:hover { background: #2d3748; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="toto01.JPG" alt="头像" class="header-avatar">
            <div class="title">Rene's Moments 📸</div>
            <div class="subtitle">日常碎片动态记录</div>
        </div>
        
        <!-- 朋友圈动态一 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月28日 10:25</span>
            <div class="moment-content">早上好 Daniel你好吗</div>
            
            <!-- 💬 动态一：正宗朋友圈回复区，你想加多少条神评都能直接整齐列在下面 -->
            <div class="wx-comment-box">
                <div class="wx-likes">❤️ Daniel, 方大同, 卢广仲</div>
                <div class="wx-comment-item">
                    <span class="wx-user">Daniel</span>: <span class="wx-text">早啊！我很好，今天有没有听方大同？🎸</span>
                </div>
                <div class="wx-comment-item">
                    <span class="wx-user">Rene</span> <span style="color: #2d3748;">回复</span> <span class="wx-user">Daniel</span>: <span class="wx-text">必须的，正在循环《三人游》呢 🎧</span>
                </div>
            </div>
        </div>

        <!-- 朋友圈动态二 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月20日 14:15</span>
            <div class="moment-content">这是较早之前的一条朋友圈动态内容。</div>
            
            <!-- 💬 动态二：正宗朋友圈回复区 -->
            <div class="wx-comment-box">
                <div class="wx-comment-item">
                    <span class="wx-user">路人甲</span>: <span class="wx-text">沙发！香港彭于晏诚不欺我 😂</span>
                </div>
                <div class="wx-comment-item">
                    <span class="wx-user">朝圣粉丝</span>: <span class="wx-text">来看小队长的忠实歌迷了！Rock'n roll 的 style！🦖</span>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

</body>
</html>
