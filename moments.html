<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的朋友圈</title>
    <!-- 🔌 引入免注册的朋友圈评论组件（完全免费且国内秒开） -->
    <script src="https://cdn.jsdelivr.net/npm/valine/dist/Valine.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            max-width: 450px; 
            width: 100%;
        }
        .header {
            text-align: center;
            margin: 20px 0 30px 0;
            color: white;
        }
        .header-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }
        .title { font-size: 24px; font-weight: 800; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .moment-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .moment-time {
            font-size: 13px;
            color: #8a99ad;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }
        .moment-content {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px; /* 新增：给下方评论区留出舒适的呼吸空间 */
        }

        /* 💬 完美复刻：微信朋友圈评论区的视觉样式 */
        .wx-comment-divider {
            font-size: 13px;
            color: #576b95;
            font-weight: 600;
            margin: 15px 0 8px 0;
            border-top: 1px dashed rgba(0,0,0,0.08);
            padding-top: 12px;
        }
        .v[data-class=v] .vwrap {
            border: 1px solid #e1e1e1 !important;
            background: #f7f7f7 !important;
            border-radius: 10px !important;
        }
        .v[data-class=v] .vwrap:focus-within {
            border-color: #07c160 !important; /* 经典微信绿 */
            background: #ffffff !important;
        }
        .v[data-class=v] .vbtn {
            background: #07c160 !important; /* 微信绿发送按钮 */
            color: #fff !important;
            border: none !important;
            border-radius: 6px !important;
            font-weight: bold !important;
        }
        .v[data-class=v] .vsys, .vpower { display: none !important; } /* 保持界面绝对纯净 */
        .v[data-class=v] .vcard .vhead .vname { color: #576b95 !important; font-weight: 600 !important; } /* 朋友圈名字蓝 */
        .v[data-class=v] .vcard .vcontent { color: #111111 !important; font-size: 14px !important; }

        .btn-back { 
            display: block; padding: 14px; background: #4a5568; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-align: center; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2); transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-back:hover { background: #2d3748; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="toto01.JPG" alt="头像" class="header-avatar">
            <div class="title">Rene's Moments 📸</div>
            <div class="subtitle">日常碎片动态记录</div>
        </div>
        
        <!-- 朋友圈动态一 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月28日 10:25</span>
            <div class="moment-content">早上好 Daniel你好吗</div>
            
            <!-- 💬 动态一的专属朋友圈回复区 -->
            <div class="wx-comment-divider">💬 评论互动</div>
            <div id="vcomments-1"></div>
        </div>

        <!-- 朋友圈动态二 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月20日 14:15</span>
            <div class="moment-content">这是较早之前的一条朋友圈动态内容。</div>
            
            <!-- 💬 动态二的专属朋友圈回复区 -->
            <div class="wx-comment-divider">💬 评论互动</div>
            <div id="vcomments-2"></div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

    <!-- 🚀 初始化两条动态的专属无后台服务器评论引擎 -->
    <script>
        // 初始化第一条动态的评论区
        new Valine({
            el: '#vcomments-1',
            appId: '9oV8wFh8p7eW8sT3K2mN5qR-gzGzoHsz',
            appKey: '4xR8wFh8p7eW8sT3K2mN5qR',
            placeholder: '说点什么吧（支持匿名）...',
            avatar: 'monsterid',
            path: '/moment-1', // 用唯一标识把不同动态的评论隔开，不会串线
            pageSize: 5,
            recordIP: false
        });

        // 初始化第二条动态的评论区
        new Valine({
            el: '#vcomments-2',
            appId: '9oV8wFh8p7eW8sT3K2mN5qR-gzGzoHsz',
            appKey: '4xR8wFh8p7eW8sT3K2mN5qR',
            placeholder: '说点什么吧（支持匿名）...',
            avatar: 'monsterid',
            path: '/moment-2', // 用唯一标识把不同动态的评论隔开，不会串线
            pageSize: 5,
            recordIP: false
        });
    </script>

</body>
</html>
