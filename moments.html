<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene's Moments</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f7f7f7; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 发布区域样式 */
        .post-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        textarea { width: 100%; border: none; outline: none; font-size: 15px; resize: none; height: 60px; }
        .post-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        input[type="text"] { border: 1px solid #eee; padding: 5px; font-size: 12px; width: 150px; }
        button { background: #07c160; color: #fff; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; }

        /* 朋友圈列表样式 */
        .moment-row { display: flex; gap: 12px; margin-bottom: 30px; background: #fff; padding: 15px; border-radius: 8px; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; }
        .name { font-weight: 600; color: #576b95; font-size: 15px; }
        .text { margin: 8px 0; line-height: 1.5; }
        .moment-img { width: 100%; max-width: 200px; border-radius: 4px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="post-box">
        <textarea id="moment-text" placeholder="这一刻的想法..."></textarea>
        <div class="post-actions">
            <input type="text" id="moment-img" placeholder="图片链接 (可选)">
            <button onclick="addMoment()">发表</button>
        </div>
    </div>

    <div id="moments-list"></div>
</div>

<script src="https://cdn.fastcomments.com/js/embed-v2.min.js"></script>
<script>
    // 页面加载时读取存储的数据
    window.onload = loadMoments;

    function addMoment() {
        const text = document.getElementById('moment-text').value;
        const imgUrl = document.getElementById('moment-img').value;
        if (!text) return alert("写点内容吧！");

        const data = { text, imgUrl, time: new Date().toLocaleString() };
        
        // 存入 localStorage
        const list = JSON.parse(localStorage.getItem('myMoments') || '[]');
        list.unshift(data);
        localStorage.setItem('myMoments', JSON.stringify(list));

        renderMoment(data);
        document.getElementById('moment-text').value = '';
        document.getElementById('moment-img').value = '';
    }

    function renderMoment(data) {
        const list = document.getElementById('moments-list');
        const div = document.createElement('div');
        div.className = 'moment-row';
        div.innerHTML = `
            <img src="toto01.jpg" class="avatar">
            <div class="content-box">
                <div class="name">Rene</div>
                <div class="text">${data.text}</div>
                ${data.imgUrl ? `<img src="${data.imgUrl}" class="moment-img" onclick="window.open(this.src)">` : ''}
            </div>
        `;
        list.insertBefore(div, list.firstChild);
    }

    function loadMoments() {
        const list = JSON.parse(localStorage.getItem('myMoments') || '[]');
        list.forEach(renderMoment);
    }
</script>
</body>
</html>
