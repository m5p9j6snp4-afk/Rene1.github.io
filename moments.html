<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene's Moments</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #ffffff; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 500px; margin: 0 auto; }
        .moment-row { display: flex; gap: 12px; margin-bottom: 40px; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; object-fit: cover; background: #eee; flex-shrink: 0; }
        .content-box { flex: 1; }
        .name { font-weight: 600; color: #576b95; font-size: 15px; margin-bottom: 2px; }
        .time { font-size: 12px; color: #b2b2b2; margin-bottom: 8px; }
        .text { margin-bottom: 12px; line-height: 1.5; font-size: 15px; }
        
        /* 图片预览样式：光标手势，点击放大 */
        .moment-img { width: 100%; max-width: 200px; border-radius: 4px; display: block; margin-bottom: 15px; cursor: zoom-in; transition: transform 0.2s; }
        .moment-img:active { transform: scale(0.98); }
        
        #fastcomments-widget { margin-top: 15px; border-top: 1px solid #f0f0f0; padding-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="moment-row">
        <img src="toto01.jpg" class="avatar" onerror="this.style.display='none'">
        <div class="content-box">
            <div class="name">Rene</div>
            <div class="time">2026年5月28日</div>
            <div class="text">晚上好</div>
            
            <!-- 图片点击放大逻辑 -->
            <img src="office03.JPG.jpg" class="moment-img" onclick="window.open(this.src)" title="点击查看大图" onerror="this.style.display='none'">
            
            <div id="fastcomments-widget"></div>
        </div>
    </div>
</div>

<script src="https://cdn.fastcomments.com/js/embed-v2.min.js"></script>
<script>
    window.FastCommentsUI(document.getElementById('fastcomments-widget'), {
        tenantId: 'pbN5Owiw1B1'
    });
</script>
</body>
</html>
