<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Rene's Moments</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #f7f7f7; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        /* 发布区 */
        .post-box { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        textarea { width: 100%; height: 60px; border: 1px solid #eee; border-radius: 4px; padding: 8px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 8px 20px; background: #07c160; color: white; border: none; border-radius: 4px; cursor: pointer; }
        /* 动态区 */
        .moment-row { background: #fff; padding: 15px; border-radius: 8px; margin-bottom: 15px; display: flex; gap: 12px; }
        .avatar { width: 40px; height: 40px; border-radius: 4px; }
        .name { color: #576b95; font-weight: 600; margin-bottom: 5px; }
        .text { margin-bottom: 10px; }
        .moment-img { width: 100%; max-width: 200px; border-radius: 4px; margin-bottom: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="post-box">
        <textarea id="msg" placeholder="这一刻的想法..."></textarea>
        <button onclick="publish()">发布</button>
    </div>
    <div id="list"></div>
</div>

<script src="https://cdn.fastcomments.com/js/embed-v2.min.js"></script>
<script>
    // 渲染动态
    function render(text, id) {
        const list = document.getElementById('list');
        const div = document.createElement('div');
        div.className = 'moment-row';
        div.innerHTML = `
            <img src="toto01.jpg" class="avatar">
            <div style="flex:1">
                <div class="name">Rene</div>
                <div class="text">${text}</div>
                <div id="${id}"></div>
            </div>
        `;
        list.insertBefore(div, list.firstChild);
        
        // 挂载独立评论区
        window.FastCommentsUI(document.getElementById(id), {
            tenantId: 'pbN5Owiw1B1',
            urlId: id
        });
    }

    // 发布动作
    function publish() {
        const text = document.getElementById('msg').value;
        if (!text) return;
        const id = 'mom-' + Date.now();
        render(text, id);
        
        // 保存到本地
        const data = JSON.parse(localStorage.getItem('myMoments') || '[]');
        data.push({text, id});
        localStorage.setItem('myMoments', JSON.stringify(data));
        document.getElementById('msg').value = '';
    }

    // 初始化加载
    window.onload = () => {
        const data = JSON.parse(localStorage.getItem('myMoments') || '[]');
        data.forEach(item => render(item.text, item.id));
    };
</script>
</body>
</html>
