<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的朋友圈</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            max-width: 450px; 
            width: 100%;
        }
        .header {
            text-align: center;
            margin: 20px 0 30px 0;
            color: white;
        }
        .header-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }
        .title { font-size: 24px; font-weight: 800; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .moment-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .moment-time {
            font-size: 13px;
            color: #8a99ad;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }
        .moment-content {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        /* 📸 完美复刻微信朋友圈评论区样式 */
        .comment-section {
            margin-top: 15px;
            border-top: 1px dashed rgba(0, 0, 0, 0.08);
            padding-top: 12px;
        }
        .comment-list {
            background: rgba(0, 0, 0, 0.03);
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 10px;
            display: none; /* 默认没有评论时隐藏盒子 */
        }
        .comment-item {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 6px;
            word-break: break-all;
        }
        .comment-item:last-child { margin-bottom: 0; }
        .comment-user {
            color: #576b95; /* 朋友圈经典名字蓝 */
            font-weight: 600;
        }
        .comment-text {
            color: #111111;
        }
        
        /* 评论输入框组合 */
        .comment-input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .input-name {
            width: 70px;
            padding: 8px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            box-sizing: border-box;
        }
        .input-text {
            flex: 1;
            padding: 8px;
            border: 1px solid #e1e1e1;
            border-radius: 8px;
            font-size: 13px;
            background: #fff;
            box-sizing: border-box;
        }
        .input-text:focus, .input-name:focus {
            border-color: #07c160;
            outline: none;
        }
        .btn-send {
            background: #07c160; /* 微信绿 */
            color: white;
            border: none;
            padding: 0 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-send:hover { opacity: 0.9; }

        .btn-back { 
            display: block; padding: 14px; background: #4a5568; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-align: center; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2); transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-back:hover { background: #2d3748; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="toto01.JPG" alt="头像" class="header-avatar">
            <div class="title">Rene's Moments 📸</div>
            <div class="subtitle">日常碎片动态记录</div>
        </div>
        
        <!-- 朋友圈动态一 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月28日 10:25</span>
            <div class="moment-content">早上好 Daniel你好吗</div>
            
            <!-- 原生无错回复区一 -->
            <div class="comment-section">
                <div class="comment-list" id="list-1"></div>
                <div class="comment-input-group">
                    <input type="text" id="name-1" class="input-name" placeholder="昵称" value="路人">
                    <input type="text" id="text-1" class="input-text" placeholder="评论...">
                    <button class="btn-send" onclick="addComment(1)">发送</button>
                </div>
            </div>
        </div>

        <!-- 朋友圈动态二 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月20日 14:15</span>
            <div class="moment-content">这是较早之前的一条朋友圈动态内容。</div>
            
            <!-- 原生无错回复区二 -->
            <div class="comment-section">
                <div class="comment-list" id="list-2"></div>
                <div class="comment-input-group">
                    <input type="text" id="name-2" class="input-name" placeholder="昵称" value="路人">
                    <input type="text" id="text-2" class="input-text" placeholder="评论...">
                    <button class="btn-send" onclick="addComment(2)">发送</button>
                </div>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

    <!-- 💡 纯前端极速数据引擎：绝不报401，数据永久保存在本地浏览器 -->
    <script>
        // 页面加载时自动渲染已有的评论
        document.addEventListener("DOMContentLoaded", () => {
            renderComments(1);
            renderComments(2);
        });

        // 渲染评论列表
        function renderComments(id) {
            const listEl = document.getElementById(`list-${id}`);
            const comments = JSON.parse(localStorage.getItem(`rene_moment_${id}`) || '[]');
            
            if (comments.length === 0) {
                listEl.style.display = 'none';
                return;
            }
            
            listEl.style.display = 'block';
            listEl.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <span class="comment-user">${escapeHtml(c.name)}:</span>
                    <span class="comment-text">${escapeHtml(c.text)}</span>
                </div>
            `).join('');
        }

        // 处理用户点击发送按钮
        function addComment(id) {
            const nameInp = document.getElementById(`name-${id}`);
            const textInp = document.getElementById(`text-${id}`);
            
            const name = nameInp.value.trim() || '匿名好友';
            const text = textInp.value.trim();
            
            if (!text) {
                alert('总得写点什么再发送嘛 🤭');
                return;
            }
            
            const comments = JSON.parse(localStorage.getItem(`rene_moment_${id}`) || '[]');
            comments.push({ name, text });
            localStorage.setItem(`rene_moment_${id}`, JSON.stringify(comments));
            
            textInp.value = ''; // 清空输入框
            renderComments(id); // 刷新列表展示
        }

        // 防止坏人注入恶意脚本的安全函数
        function escapeHtml(str) {
            return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }
    </script>

</body>
</html>
