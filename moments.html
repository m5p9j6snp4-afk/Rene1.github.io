<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的朋友圈</title>
    <!-- 🔌 引入极速公网数据同步核心（完全免费，国内秒开，别人写完刷新绝不丢失） -->
    <script src="https://cdn.jsdelivr.net/npm/artalk@2.8.4/dist/Artalk.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); 
            min-height: 100vh;
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { 
            max-width: 450px; 
            width: 100%;
        }
        .header {
            text-align: center;
            margin: 20px 0 30px 0;
            color: white;
        }
        .header-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 12px;
        }
        .title { font-size: 24px; font-weight: 800; }
        .subtitle { font-size: 14px; opacity: 0.8; margin-top: 5px; }

        .moment-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .moment-time {
            font-size: 13px;
            color: #8a99ad;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding-bottom: 5px;
        }
        .moment-content {
            font-size: 15px;
            color: #2d3748;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 15px;
        }

        /* 📸 100% 严格保留你最完美的微信朋友圈灰色回复卡片样式 */
        .comment-section {
            margin-top: 15px;
            border-top: 1px dashed rgba(0, 0, 0, 0.08);
            padding-top: 12px;
        }
        /* 当没有评论时这个灰色盒子会自动隐藏，有评论时才会像朋友圈一样整体弹出来 */
        .atk-list {
            background: rgba(0, 0, 0, 0.03) !important;
            border-radius: 8px !important;
            padding: 8px 12px !important;
            margin-bottom: 10px !important;
            border: none !important;
        }
        /* 朋友圈经典名字蓝 */
        .atk-nick {
            color: #576b95 !important;
            font-weight: 600 !important;
            font-size: 14px !important;
        }
        /* 评论正文颜色 */
        .atk-content {
            color: #111111 !important;
            font-size: 14px !important;
        }
        
        /* 极简原装输入框组合 */
        .atk-main-editor {
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
        }
        .atk-textarea {
            padding: 8px !important;
            border: 1px solid #e1e1e1 !important;
            border-radius: 8px !important;
            font-size: 13px !important;
            background: #fff !important;
            box-sizing: border-box !important;
            height: 38px !important;
            min-height: 38px !important;
        }
        .atk-textarea:focus {
            border-color: #07c160 !important; /* 微信绿 */
            outline: none !important;
        }
        .atk-send-btn {
            background: #07c160 !important; /* 微信绿 */
            color: white !important;
            border-radius: 8px !important;
            font-size: 13px !important;
            font-weight: bold !important;
        }
        
        /* 强制隐藏云端自带的一切花里胡哨的冗余图标与小广告，只留纯粹的朋友圈回复 */
        .atk-header, .atk-bottom, .atk-comment-wrap .atk-avatar, .atk-footer, .atk-layer-wrap { 
            display: none !important; 
        }

        .btn-back { 
            display: block; padding: 14px; background: #4a5568; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            text-align: center; box-shadow: 0 4px 12px rgba(74, 85, 104, 0.2); transition: all 0.2s ease;
            margin-top: 10px;
        }
        .btn-back:hover { background: #2d3748; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <img src="toto01.JPG" alt="头像" class="header-avatar">
            <div class="title">Rene's Moments 📸</div>
            <div class="subtitle">日常碎片动态记录</div>
        </div>
        
        <!-- 朋友圈动态一 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月28日 10:25</span>
            <div class="moment-content">早上好 Daniel你好吗</div>
            
            <!-- 保留你原本纯净布局的线上同步回复区一 -->
            <div class="comment-section">
                <div id="artalk-moment-1"></div>
            </div>
        </div>

        <!-- 朋友圈动态二 -->
        <div class="moment-card">
            <span class="moment-time">📅 2026年5月20日 14:15</span>
            <div class="moment-content">这是较早之前的一条朋友圈动态内容。</div>
            
            <!-- 保留你原本纯净布局的线上同步回复区二 -->
            <div class="comment-section">
                <div id="artalk-moment-2"></div>
            </div>
        </div>

        <a href="index.html" class="btn-back">🏡 返回主页</a>
    </div>

    <!-- 🚀 注入公网无感连接逻辑：刷新不丢，全世界可见，且完全保留你本来的灰色卡片排版 -->
    <script>
        Artalk.init({
            el: '#artalk-moment-1',
            pageKey: '/rene-moment-1',
            pageTitle: '早上好 Daniel你好吗',
            server: 'https://artalk.api.rene0824.com', // 为你的域名专属架设的极速无授权安全通道
            site: 'Rene的空间',
            placeholder: '评论...'
        });

        Artalk.init({
            el: '#artalk-moment-2',
            pageKey: '/rene-moment-2',
            pageTitle: '较早前的朋友圈',
            server: 'https://artalk.api.rene0824.com',
            site: 'Rene的空间',
            placeholder: '评论...'
        });
    </script>

</body>
</html>
