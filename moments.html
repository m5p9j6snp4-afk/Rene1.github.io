<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene's Moments</title>
    <style>
        :root { --bg: #f8f9fa; --card-bg: #ffffff; --text-main: #1a1a1a; --text-light: #8e8e93; --accent: #576b95; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px 0; color: var(--text-main); }
        .container { max-width: 480px; margin: 0 auto; }
        .moment-card { background: var(--card-bg); padding: 24px; margin-bottom: 12px; }
        .moment-time { font-size: 12px; color: var(--text-light); margin-bottom: 8px; display: block; }
        .moment-content { font-size: 16px; line-height: 1.5; margin-bottom: 16px; }
        .moment-img { width: 100%; border-radius: 8px; margin-bottom: 16px; object-fit: cover; display: block; }
        .comment-section { background: #f2f2f7; padding: 12px; border-radius: 6px; font-size: 14px; }
        .comment-item { margin-bottom: 8px; line-height: 1.4; }
        .wl-nick { color: var(--accent); font-weight: 600; margin-right: 4px; }
        .wl-reply-to { color: var(--accent); font-weight: 600; margin: 0 4px; }
        .wl-content { color: #333; }
    </style>
</head>
<body>

<div class="container">

    <!-- 🌟 新动态 -->
    <div class="moment-card">
        <span class="moment-time">14:30</span>
        <div class="moment-content">好饱好饱</div>
        <img src="你的图片文件名.jpg" class="moment-img" onerror="this.style.display='none'">
        <div class="comment-section">
            <div class="comment-item"><span class="wl-nick">彭于晏:</span><span class="wl-content">刚才不是饿吗</span></div>
            <div class="comment-item">
                <span class="wl-nick">Rene</span> 回复 <span class="wl-reply-to">彭于晏</span>：<span class="wl-content">刚才饿坏了，现在吃饱啦！</span>
            </div>
        </div>
    </div>

    <!-- 原有动态 1 -->
    <div class="moment-card">
        <span class="moment-time">12:06</span>
        <div class="moment-content">时间好慢，好饿。</div>
        <img src="你的图片文件名.jpg" class="moment-img" onerror="this.style.display='none'">
        <div class="comment-section">
            <div class="comment-item"><span class="wl-nick">Daniel:</span><span class="wl-content">看着好无聊</span></div>
            <div class="comment-item">
                <span class="wl-nick">Rene</span> 回复 <span class="wl-reply-to">Daniel</span>：<span class="wl-content">玩游戏玩游戏</span>
            </div>
            <div class="comment-item"><span class="wl-nick">Sarah:</span><span class="wl-content">这么无聊</span></div>
        </div>
    </div>

    <!-- 原有动态 2 -->
    <div class="moment-card">
        <span class="moment-time">12:05</span>
        <div class="moment-content">今天 office 没有人，好安静。</div>
        <img src="office03.JPG.jpg" class="moment-img" onerror="this.style.display='none'">
        <div class="comment-section">
            <div class="comment-item"><span class="wl-nick">老王:</span><span class="wl-content">一个人包场真好，可以偷偷听歌。</span></div>
            <div class="comment-item">
                <span class="wl-nick">Rene</span> 回复 <span class="wl-reply-to">老王</span>：<span class="wl-content">确实，安静到听见呼吸声，效率加倍。</span>
            </div>
            <div class="comment-item"><span class="wl-nick">Linda:</span><span class="wl-content">这种时刻最适合思考人生了，别太累哦。</span></div>
        </div>
    </div>

</div>

</body>
</html>
