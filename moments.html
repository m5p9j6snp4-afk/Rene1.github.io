<!-- 1. 发布区域 -->
<div style="margin-bottom: 30px;">
    <textarea id="moment-input" placeholder="这一刻的想法..." style="width: 100%; height: 60px;"></textarea>
    <button onclick="postMoment()">发布动态</button>
</div>

<!-- 2. 动态展示区域 -->
<div id="moments-list"></div>

<!-- 3. 加载 FastComments 核心脚本 -->
<script src="https://cdn.fastcomments.com/js/embed-v2.min.js"></script>

<script>
    // 发布动态逻辑
    function postMoment() {
        const text = document.getElementById('moment-input').value;
        if (!text) return;

        // 生成一个基于时间的唯一ID，作为这条动态的“评论ID”
        const uniqueId = 'moment-' + Date.now();
        
        createMomentElement(text, uniqueId);
        document.getElementById('moment-input').value = '';
    }

    // 渲染动态及绑定评论
    function createMomentElement(text, uniqueId) {
        const container = document.getElementById('moments-list');
        const wrapper = document.createElement('div');
        wrapper.className = 'moment-row';
        wrapper.innerHTML = `
            <img src="toto01.jpg" class="avatar">
            <div class="content-box">
                <div class="name">Rene</div>
                <div class="text">${text}</div>
                <!-- 这是每一条动态专属的评论区 -->
                <div id="${uniqueId}" style="margin-top: 10px;"></div>
            </div>
        `;
        container.insertBefore(wrapper, container.firstChild);

        // 调用 FastComments，为这个唯一 ID 挂载评论区
        window.FastCommentsUI(document.getElementById(uniqueId), {
            tenantId: 'pbN5Owiw1B1',
            urlId: uniqueId // 核心：这就是区分不同动态评论的关键
        });
    }
</script>
