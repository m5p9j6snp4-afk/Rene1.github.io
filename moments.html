<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的朋友圈</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 450px; width: 100%; }
        .moment-card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .comment-box { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .comment-item { font-size: 14px; margin: 5px 0; border-bottom: 1px solid #f9f9f9; padding: 3px 0; }
        input, button { padding: 8px; margin-top: 5px; }
        button { background: #07c160; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container" id="moments">
    <div class="moment-card">
        <div>早上好 Daniel你好吗</div>
        <div class="comment-box" id="comments-moment-1">
            <div class="list">加载中...</div>
            <input type="text" id="input-1" placeholder="昵称">
            <input type="text" id="text-1" placeholder="评论内容">
            <button onclick="postComment('moment-1')">发送</button>
        </div>
    </div>
</div>

<script>
    // 你的专属接口地址
    const API_URL = 'https://late-water-d55a.bmk4byvf9b.workers.dev';

    async function loadComments(id) {
        const res = await fetch(`${API_URL}?id=${id}`);
        const data = await res.json();
        const list = document.querySelector(`#comments-${id} .list`);
        list.innerHTML = data.map(c => `<div class="comment-item"><b>${c.name}:</b> ${c.text}</div>`).join('');
    }

    async function postComment(id) {
        const name = document.getElementById(`input-${id.split('-')[1]}`).value;
        const text = document.getElementById(`text-${id.split('-')[1]}`).value;
        await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ id, name, text })
        });
        loadComments(id);
    }

    // 初始化加载
    loadComments('moment-1');
</script>

</body>
</html>
