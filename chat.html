<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene的AI 助手</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-ai: #2d2d2d;
            --bg-user: #254b80;
            --text-main: #f0f0f0;
            --text-ai: #ff6b6b;
            --border: #333;
        }
        .light-mode {
            --bg-main: #f5f5f5;
            --bg-card: #ffffff;
            --bg-ai: #e9e9e9;
            --bg-user: #407bbd;
            --text-main: #222222;
            --text-ai: #e53935;
            --border: #ddd;
        }
        body { 
            font-family: "Microsoft Yahei", sans-serif; 
            background: var(--bg-main); 
            color: var(--text-main); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px 15px; 
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            transition: background 0.3s, color 0.3s;
        }

        h3 {
            font-size: 22px;
            margin-bottom: 18px;
            letter-spacing: 1px;
        }
        
        .mode-selector, .func-bar {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 聊天容器 */
        #chat { 
            width: 100%; 
            max-width: 520px; 
            height: 420px; 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 18px; 
            padding: 18px; 
            overflow-y: auto; 
            margin-bottom: 20px; 
            font-size: 15px;
            line-height: 1.6;
        }
        /* 自定义滚动条 */
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #chat::-webkit-scrollbar-track {
            background: #222;
        }
        .light-mode #chat::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        /* 消息气泡 */
        .msg-ai {
            background: var(--bg-ai);
            color: var(--text-ai);
            padding: 10px 14px;
            border-radius: 12px 12px 12px 4px;
            max-width: 85%;
            margin: 8px 0;
            text-align: left;
            word-wrap: break-word;
            cursor: pointer;
            position: relative;
        }
        .msg-user {
            background: var(--bg-user);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 12px 12px 4px 12px;
            max-width: 85%;
            margin: 8px 0 8px auto;
            text-align: left;
            word-wrap: break-word;
        }
        .loading {
            color: #888;
            margin: 8px 0;
            padding-left: 10px;
        }
        .error-msg {
            color: #ff4444;
            margin: 8px 0;
        }
        .copy-tip {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }

        /* 输入框 */
        #userInput { 
            width: 100%; 
            max-width: 520px; 
            padding: 14px 20px; 
            border-radius: 30px; 
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            margin-bottom: 15px; 
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        #userInput:focus {
            border-color: #666;
        }
        
        /* 按钮样式 */
        button { 
            padding: 12px 20px; 
            font-size: 15px; 
            border-radius: 30px; 
            border: none; 
            background: #2c2c2c; 
            color: white; 
            cursor: pointer; 
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .light-mode button {
            background: #e0e0e0;
            color: #222;
        }
        button:hover {
            background: #444;
        }
        .light-mode button:hover {
            background: #d0d0d0;
        }
        button:active {
            transform: scale(0.97);
        }

        a { 
            margin-top: 25px; 
            color: #888; 
            text-decoration: none; 
            font-size: 15px;
            transition: color 0.2s;
        }
        a:hover {
            color: #ccc;
        }
    </style>
    <!-- 登录校验：未登录自动跳回首页 -->
    <script>
        if(localStorage.getItem("siteLogin") !== "ok"){
            location.href = "index.html";
        }
    </script>
</head>
<body>
    <h3>Rene的AI 助手</h3>

    <!-- 模式选择：智囊 / 治愈 / 闲聊 三模式 -->
    <div class="mode-selector">
        <button onclick="setMode('toxic')" id="toxic-btn" style="background: #000; color: #fff;">智囊模式</button>
        <button onclick="setMode('comfort')" id="comfort-btn">治愈模式</button>
        <button onclick="setMode('chat')" id="chat-btn">闲聊模式</button>
    </div>

    <!-- 功能按钮：清空对话 / 主题切换 -->
    <div class="func-bar">
        <button onclick="clearChat()">清空對話</button>
        <button onclick="toggleTheme()">切換主題</button>
    </div>

    <!-- 聊天区域 -->
    <div id="chat">
        <div class="msg-ai" onclick="copyMsg(this)">我是Rene的智囊AI，有什么问题尽管说。</div>
    </div>

    <input type="text" id="userInput" placeholder="輸入消息，按回車或點擊發送（單條最多200字）" onkeydown="enterSend(event)">
    
    <div class="func-bar">
        <button onclick="getReply()">發送</button>
    </div>

    <a href="index.html">⬅️ 返回首頁</a>

    <!-- 复制提示浮窗 -->
    <div class="copy-tip" id="copyTip">複製成功</div>

    <script>
        let currentMode = 'toxic';
        let chatHistory = [];
        const MAX_HISTORY_ROUND = 10;
        const MAX_INPUT_LENGTH = 200; // 单条消息最大字数
        const chatBox = document.getElementById('chat');
        const inputField = document.getElementById('userInput');
        const copyTip = document.getElementById('copyTip');
        const workerUrl = `https://lively-darkness-2561.bmk4byvf9b.workers.dev/?mode=`;

        // 页面加载初始化
        window.addEventListener('load', () => {
            // 读取主题
            const theme = localStorage.getItem("siteTheme");
            if(theme === "light"){
                document.body.classList.add("light-mode");
            }
            // 读取聊天记录
            const localHis = localStorage.getItem("chatHistory");
            if (localHis) {
                chatHistory = JSON.parse(localHis);
                renderHistory();
            }
            // 初始网络检测
            checkNetwork();
        });

        // 网络状态检测
        function checkNetwork() {
            if(!navigator.onLine){
                chatBox.innerHTML += `<div class="error-msg">⚠️ 當前網絡離線，無法請求AI</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }
        window.addEventListener("online", checkNetwork);
        window.addEventListener("offline", checkNetwork);

        // 主题切换 深色/浅色
        function toggleTheme() {
            document.body.classList.toggle("light-mode");
            if(document.body.classList.contains("light-mode")){
                localStorage.setItem("siteTheme","light");
            }else{
                localStorage.setItem("siteTheme","dark");
            }
        }

        // 渲染历史消息
        function renderHistory() {
            chatBox.innerHTML = "";
            chatHistory.forEach(item => {
                if(item.role === "user"){
                    chatBox.innerHTML += `<div class="msg-user">${item.content}</div>`;
                }else{
                    chatBox.innerHTML += `<div class="msg-ai" onclick="copyMsg(this)">${item.content}</div>`;
                }
            })
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // 切换对话模式
        function setMode(mode) {
            currentMode = mode;
            chatHistory = [];
            localStorage.removeItem("chatHistory");

            // 重置按钮样式
            document.getElementById('toxic-btn').style.background = mode === 'toxic' ? '#000' : '#ccc';
            document.getElementById('toxic-btn').style.color = mode === 'toxic' ? '#fff' : '#000';
            document.getElementById('comfort-btn').style.background = mode === 'comfort' ? '#000' : '#ccc';
            document.getElementById('comfort-btn').style.color = mode === 'comfort' ? '#fff' : '#000';
            document.getElementById('chat-btn').style.background = mode === 'chat' ? '#000' : '#ccc';
            document.getElementById('chat-btn').style.color = mode === 'chat' ? '#fff' : '#000';

            // 对应开场白
            let text = "";
            switch(mode){
                case "toxic":
                    text = "我是Rene的智囊AI，有什么问题尽管说。";
                    break;
                case "comfort":
                    text = "我是Rene的安慰AI，我会一直陪着你。";
                    break;
                case "chat":
                    text = "放輕鬆～隨便聊聊吧😊";
                    break;
            }
            chatBox.innerHTML = `<div class="msg-ai" onclick="copyMsg(this)">${text}</div>`;
        }

        // 回车发送
        function enterSend(e) {
            if(e.keyCode === 13) {
                getReply();
            }
        }

        // 清空对话
        function clearChat() {
            if(!confirm("確定要清空所有對話記錄嗎？")) return;
            chatHistory = [];
            localStorage.removeItem("chatHistory");
            setMode(currentMode);
        }

        // 复制AI消息
        function copyMsg(el) {
            const text = el.innerText;
            navigator.clipboard.writeText(text).then(()=>{
                copyTip.style.display = "block";
                setTimeout(()=>{
                    copyTip.style.display = "none";
                }, 1200);
            }).catch(()=>{
                alert("複製失敗，請手動選取");
            });
            // 朗读文本
            readVoice(text);
        }

        // 语音朗读
        function readVoice(text) {
            if(!window.speechSynthesis) return;
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = "zh-CN";
            utter.rate = 1;
            speechSynthesis.speak(utter);
        }

        // 发送消息主逻辑
        async function getReply() {
            // 离线拦截
            if(!navigator.onLine){
                alert("網絡離線，無法發送請求");
                return;
            }
            let input = inputField.value.trim();
            // 字数限制
            if(input.length > MAX_INPUT_LENGTH){
                alert(`消息不能超過 ${MAX_INPUT_LENGTH} 字`);
                return;
            }
            if (!input) return;

            // 限制历史轮数
            if (chatHistory.length > MAX_HISTORY_ROUND * 2) {
                chatHistory = chatHistory.slice(-MAX_HISTORY_ROUND * 2);
            }

            // 展示用户消息
            chatBox.innerHTML += `<div class="msg-user">${input}</div>`;
            // 加载提示
            const loadingDom = document.createElement("div");
            loadingDom.className = "loading";
            loadingDom.innerText = "AI 思考中...";
            chatBox.appendChild(loadingDom);
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const res = await fetch(workerUrl + currentMode, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: input,
                        history: chatHistory
                    })
                });
                const data = await res.json();
                chatBox.removeChild(loadingDom);

                if (data.reply) {
                    chatBox.innerHTML += `<div class="msg-ai" onclick="copyMsg(this)">${data.reply}</div>`;
                    chatHistory = data.history;
                    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));
                } else if (data.error) {
                    chatBox.innerHTML += `<div class="error-msg">錯誤：${data.error}</div>`;
                }
            } catch (e) {
                chatBox.removeChild(loadingDom);
                chatBox.innerHTML += `<div class="error-msg">連接失敗，請檢查接口</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
