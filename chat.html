<!DOCTYPE html>
<!-- 选择模式的按钮 -->
<div class="mode-selector" style="margin-bottom: 10px;">
    <button onclick="setMode('toxic')" id="toxic-btn" style="background: #000; color: #fff;">智囊模式</button>
    <button onclick="setMode('comfort')" id="comfort-btn">治愈模式</button>
</div>

<script>
    let currentMode = 'toxic'; // 默认状态

    function setMode(mode) {
        currentMode = mode;
        // 简单的视觉反馈
        document.getElementById('toxic-btn').style.background = (mode === 'toxic' ? '#000' : '#ccc');
        document.getElementById('comfort-btn').style.background = (mode === 'comfort' ? '#000' : '#ccc');
        console.log("当前模式已切换为:", currentMode);
    }
</script>

<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：添加这一行，手机端显示就不会太小 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene的AI 毒舌助手</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        #chat { 
            width: 90%; 
            max-width: 500px; 
            height: 400px; 
            background: #000; 
            border: 1px solid #444; 
            border-radius: 15px; 
            padding: 20px; 
            overflow-y: auto; 
            margin-bottom: 20px; 
            color: #ff5555;
            font-size: 16px;
        }
        
        input { 
            width: 90%; 
            max-width: 500px; 
            padding: 16px; 
            border-radius: 25px; 
            border: none; 
            margin-bottom: 15px; 
            font-size: 16px;
            box-sizing: border-box; /* 确保 padding 不会撑破宽度 */
        }
        
        button { 
            padding: 15px 40px; 
            font-size: 18px; 
            border-radius: 25px; 
            border: none; 
            background: #343a40; 
            color: white; 
            cursor: pointer; 
            font-weight: bold;
        }
        
        a { margin-top: 20px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <h3>Rene的AI 毒舌助手</h3>
    <div id="chat">AI: 又來送罵？快說吧，我準備好了。</div>
    <input type="text" id="userInput" placeholder="輸入你想說的...">
    <button onclick="getReply()">發送</button>
    <br><a href="index.html">⬅️ 返回首頁</a>

    <script>
        async function getReply() {
            const inputField = document.getElementById('userInput');
            const input = inputField.value;
            const chat = document.getElementById('chat');
            const workerUrl = "https://lively-darkness-2561.bmk4byvf9b.workers.dev/"; 

            if(!input) return;
            chat.innerHTML += "<div>我: " + input + "</div>";
            inputField.value = "...";

            try {
                const response = await fetch(workerUrl, {
                    method: 'POST',
                    body: JSON.stringify({ message: input })
                });
                const data = await response.json();
                chat.innerHTML += "<div style='color:#fff; margin-bottom:10px;'>AI: " + data.reply + "</div>";
            } catch (e) {
                chat.innerHTML += "<div style='color:red;'>连接失败，请检查 Worker 设置。</div>";
            }
            inputField.value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
