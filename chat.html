<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Rene的AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-ai: #2d2d2d;
            --bg-user: #254b80;
            --text-main: #f0f0f0;
            --text-ai: #ff6b6b;
            --border: #333;
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --animate-speed: 0.3s;
        }
        .light-mode {
            --bg-main: #f5f5f5;
            --bg-card: #ffffff;
            --bg-ai: #e9e9e9;
            --bg-user: #407bbd;
            --text-main: #222222;
            --text-ai: #e53935;
            --border: #ddd;
            --shadow: 0 4px 12px rgba(0,0,0,0.1);
        }
        body {
            font-family: "Microsoft Yahei", sans-serif;
            background: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            min-height: 100vh;
            user-select: none;
            -webkit-user-select: none;
            transition: background var(--animate-speed), color var(--animate-speed);
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }
        @keyframes fadeIn {
            to { opacity: 1; }
        }
        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h3 {
            font-size: 22px;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .role-set {
            width: 100%;
            max-width: 520px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            display: block;
        }
        .role-set p {
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text-main);
        }
        .role-set input, .role-set textarea {
            width: 100%;
            background: var(--bg-main);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            padding: 8px;
            margin-bottom: 8px;
            outline: none;
            font-size: 14px;
        }
        .role-set textarea {
            height: 60px;
            resize: none;
        }
        /* 提交按钮间距 */
        .role-submit {
            text-align: right;
        }

        .mode-box {
            width: 100%;
            max-width: 520px;
            margin-bottom: 12px;
        }
        .fixed-mode {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 8px;
        }
        .custom-mode {
            display: flex;
            justify-content: center;
        }

        .func-bar, .quick-word {
            margin-bottom: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        #chat {
            width: 100%;
            max-width: 520px;
            height: 400px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 18px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 15px;
            line-height: 1.6;
            box-shadow: var(--shadow);
        }
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 3px;
        }
        #chat::-webkit-scrollbar-track {
            background: #222;
        }
        .light-mode #chat::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .msg-ai {
            background: var(--bg-ai);
            color: var(--text-ai);
            padding: 10px 14px;
            border-radius: 12px 12px 12px 4px;
            max-width: 85%;
            margin: 8px 0;
            text-align: left;
            word-wrap: break-word;
            cursor: pointer;
            position: relative;
            animation: msgPop 0.3s ease;
        }
        .msg-user {
            background: var(--bg-user);
            color: #ffffff;
            padding: 10px 14px;
            border-radius: 12px 12px 4px 12px;
            max-width: 85%;
            margin: 8px 0 8px auto;
            text-align: left;
            word-wrap: break-word;
            animation: msgPop 0.3s ease;
        }
        .msg-time {
            font-size: 11px;
            opacity: 0.6;
            margin-top: 4px;
            display: block;
        }
        .loading {
            color: #888;
            margin: 8px 0;
            padding-left: 10px;
            animation: msgPop 0.3s ease;
        }
        .error-msg {
            color: #ff4444;
            margin: 8px 0;
            animation: msgPop 0.3s ease;
        }

        .count-text {
            width: 100%;
            max-width: 520px;
            text-align: right;
            font-size: 12px;
            opacity: 0.7;
            margin-bottom: 8px;
        }

        #userInput {
            width: 100%;
            max-width: 520px;
            padding: 14px 20px;
            border-radius: 30px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-main);
            margin-bottom: 8px;
            font-size: 15px;
            outline: none;
            transition: border 0.2s;
        }
        #userInput:focus {
            border-color: #666;
        }
        #userInput:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        button {
            padding: 10px 16px;
            font-size: 14px;
            border-radius: 30px;
            border: none;
            background: #2c2c2c;
            color: white;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .light-mode button {
            background: #e0e0e0;
            color: #222;
        }
        button:hover:not(:disabled) {
            background: #444;
        }
        .light-mode button:hover:not(:disabled) {
            background: #d0d0d0;
        }
        button:active:not(:disabled) {
            transform: scale(0.97);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        a {
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s;
        }
        a:hover {
            color: #ccc;
        }

        .copy-tip {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            display: none;
            z-index: 999;
            animation: fadeIn 0.2s;
        }
    </style>
    <script>
        if(localStorage.getItem("siteLogin") !== "ok"){
            location.href = "index.html";
        }
    </script>
</head>
<body>
    <h3>Rene的AI</h3>

    <!-- 新增：提交人设按钮 -->
    <div class="role-set" id="rolePanel">
        <p>自定义角色名称（男友/女友/明星/朋友等）</p>
        <input type="text" id="roleName" placeholder="输入角色名字">
        <p>人物设定、性格、说话风格</p>
        <textarea id="roleDesc" placeholder="描述身份、性格、语气、相处模式..."></textarea>
        <div class="role-submit">
            <button onclick="saveRole()">提交人设</button>
        </div>
    </div>

    <div class="mode-box">
        <div class="fixed-mode" id="fixedMode">
            <button onclick="setMode('hamburger')" id="hamburger-btn">汉堡模式</button>
            <button onclick="setMode('fries')" id="fries-btn">薯条模式</button>
        </div>
        <div class="custom-mode">
            <button onclick="setMode('custom')" id="custom-btn">自定义角色</button>
        </div>
    </div>

    <div class="func-bar">
        <button onclick="clearChat()">清空對話</button>
        <button onclick="toggleTheme()">切換主題</button>
        <button onclick="toggleVoice()">語音朗讀：開</button>
    </div>

    <div class="quick-word">
        <button onclick="fillWord('你好')">你好</button>
        <button onclick="fillWord('謝謝')">謝謝</button>
        <button onclick="fillWord('再見')">再見</button>
    </div>

    <div id="chat"></div>

    <div class="count-text" id="countText">0 / 200</div>

    <input type="text" id="userInput" placeholder="輸入消息，回車發送"
           onkeydown="if(event.keyCode===13) getReply()" oninput="calcLength()">

    <div class="func-bar">
        <button onclick="getReply()" id="sendBtn">發送</button>
    </div>

    <a href="index.html">⬅️ 返回首頁</a>

    <div class="copy-tip" id="copyTip">複製成功</div>

    <script>
        let currentMode = 'hamburger';
        let chatHistory = [];
        let voiceOpen = true;
        // 缓存已提交的人设
        let savedRoleName = "";
        let savedRoleDesc = "";

        const MAX_INPUT_LENGTH = 200;
        const MAX_HISTORY = 12;
        const TYPE_SPEED = 40;
        const chatBox = document.getElementById('chat');
        const inputField = document.getElementById('userInput');
        const copyTip = document.getElementById('copyTip');
        const sendBtn = document.getElementById('sendBtn');
        const countText = document.getElementById('countText');
        const roleName = document.getElementById('roleName');
        const roleDesc = document.getElementById('roleDesc');
        const rolePanel = document.getElementById('rolePanel');
        const fixedMode = document.getElementById('fixedMode');
        const workerUrl = `https://lively-darkness-2561.bmk4byvf9b.workers.dev/?mode=`;

        // 保存人设函数
        function saveRole(){
            savedRoleName = roleName.value.trim();
            savedRoleDesc = roleDesc.value.trim();
            localStorage.setItem("roleName", savedRoleName);
            localStorage.setItem("roleDesc", savedRoleDesc);
            alert("人设提交成功！");
        }

        function getTimeStr() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        window.addEventListener('load', () => {
            const theme = localStorage.getItem("siteTheme");
            if (theme === "light") document.body.classList.add("light-mode");

            const lastMode = localStorage.getItem("lastMode") || "hamburger";
            // 读取本地缓存人设
            if (localStorage.getItem("roleName")) {
                roleName.value = localStorage.getItem("roleName");
                savedRoleName = roleName.value;
            }
            if (localStorage.getItem("roleDesc")) {
                roleDesc.value = localStorage.getItem("roleDesc");
                savedRoleDesc = roleDesc.value;
            }

            const localHis = localStorage.getItem("chatHistory");
            if (localHis) {
                chatHistory = JSON.parse(localHis);
                renderHistory();
            }

            setMode(lastMode);
            window.addEventListener("online", checkNetwork);
            window.addEventListener("offline", checkNetwork);
            checkNetwork();
        });

        function checkNetwork() {
            if (!navigator.onLine) {
                chatBox.innerHTML += `<div class="error-msg">⚠️ 網絡離線，暫無法使用</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function toggleTheme() {
            document.body.classList.toggle("light-mode");
            localStorage.setItem("siteTheme", document.body.classList.contains("light-mode") ? "light" : "dark");
        }

        function toggleVoice() {
            voiceOpen = !voiceOpen;
            event.target.innerText = voiceOpen ? "語音朗讀：開" : "語音朗讀：關";
        }

        function fillWord(txt) {
            inputField.value = txt;
            calcLength();
        }

        function calcLength() {
            const len = inputField.value.length;
            countText.innerText = `${len} / ${MAX_INPUT_LENGTH}`;
        }

        function renderHistory() {
            chatBox.innerHTML = "";
            chatHistory.forEach(item => {
                const time = item.time || "";
                if (item.role === "user") {
                    chatBox.innerHTML += `
                        <div class="msg-user">
                            ${item.content}
                            <span class="msg-time">${time}</span>
                        </div>`;
                } else {
                    chatBox.innerHTML += `
                        <div class="msg-ai" onclick="copyMsg(this)">
                            ${item.content}
                            <span class="msg-time">${time}</span>
                        </div>`;
                }
            })
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem("lastMode", mode);
            chatHistory = [];
            localStorage.removeItem("chatHistory");

            document.getElementById('hamburger-btn').style.background = mode === 'hamburger' ? '#000' : '#ccc';
            document.getElementById('hamburger-btn').style.color = mode === 'hamburger' ? '#fff' : '#000';
            document.getElementById('fries-btn').style.background = mode === 'fries' ? '#000' : '#ccc';
            document.getElementById('fries-btn').style.color = mode === 'fries' ? '#fff' : '#000';
            document.getElementById('custom-btn').style.background = mode === 'custom' ? '#000' : '#ccc';
            document.getElementById('custom-btn').style.color = mode === 'custom' ? '#fff' : '#000';

            if (mode === "custom") {
                fixedMode.style.display = "none";
            } else {
                fixedMode.style.display = "flex";
            }
            rolePanel.style.display = "block";

            let welcome = "";
            switch (mode) {
                case "hamburger":
                    welcome = "我是汉堡，很高兴为你服务。";
                    break;
                case "fries":
                    welcome = "我是薯条，随时陪你聊天。";
                    break;
                case "custom":
                    welcome = "请先设置角色并点击【提交人设】，再开始聊天吧~";
                    break;
            }
            chatBox.innerHTML = `<div class="msg-ai" onclick="copyMsg(this)">${welcome}<span class="msg-time">${getTimeStr()}</span></div>`;
        }

        function clearChat() {
            if (!confirm("確定清空所有對話？")) return;
            chatHistory = [];
            localStorage.removeItem("chatHistory");
            setMode(currentMode);
        }

        function copyMsg(el) {
            const text = el.innerText.replace(/\d{2}:\d{2}$/, '').trim();
            navigator.clipboard.writeText(text).then(() => {
                copyTip.style.display = "block";
                setTimeout(() => copyTip.style.display = "none", 1200);
            }).catch(() => alert("複製失敗"));

            if (voiceOpen && window.speechSynthesis) {
                speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = "zh-CN";
                utter.rate = 1;
                speechSynthesis.speak(utter);
            }
        }

        async function typeWriter(box, text) {
            box.innerHTML = "";
            for (let i = 0; i < text.length; i++) {
                box.innerHTML += text[i];
                chatBox.scrollTop = chatBox.scrollHeight;
                await new Promise(res => setTimeout(res, TYPE_SPEED));
            }
        }

        async function getReply() {
            if (!navigator.onLine) {
                alert("網絡離線，無法發送");
                return;
            }
            let input = inputField.value.trim();
            if (input.length > MAX_INPUT_LENGTH) {
                alert(`消息最大 ${MAX_INPUT_LENGTH} 字`);
                return;
            }
            if (!input) return;

            sendBtn.disabled = true;
            inputField.disabled = true;

            if (chatHistory.length > MAX_HISTORY) {
                chatHistory = chatHistory.slice(-MAX_HISTORY);
            }

            const nowTime = getTimeStr();
            chatBox.innerHTML += `
                <div class="msg-user">
                    ${input}
                    <span class="msg-time">${nowTime}</span>
                </div>`;
            const loadingDom = document.createElement("div");
            loadingDom.className = "loading";
            loadingDom.innerText = "AI 思考中...";
            chatBox.appendChild(loadingDom);
            inputField.value = "";
            calcLength();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let postData = { message: input, history: chatHistory };
                // 改用已提交缓存的人设
                if (currentMode === "custom") {
                    postData.roleName = savedRoleName;
                    postData.roleDesc = savedRoleDesc;
                }

                const res = await fetch(workerUrl + currentMode, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(postData)
                });
                const data = await res.json();
                chatBox.removeChild(loadingDom);

                if (data.reply) {
                    const aiBox = document.createElement("div");
                    aiBox.className = "msg-ai";
                    aiBox.onclick = function () { copyMsg(this); };
                    chatBox.appendChild(aiBox);
                    await typeWriter(aiBox, data.reply);
                    aiBox.innerHTML += `<span class="msg-time">${nowTime}</span>`;

                    chatHistory.push({ role: "user", content: input, time: nowTime });
                    chatHistory.push({ role: "ai", content: data.reply, time: nowTime });
                    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

                    document.title = "✨ 收到新回覆";
                    setTimeout(() => document.title = "Rene的AI", 2000);
                } else if (data.error) {
                    chatBox.innerHTML += `<div class="error-msg">錯誤：${data.error}</div>`;
                }
            } catch (e) {
                chatBox.removeChild(loadingDom);
                chatBox.innerHTML += `<div class="error-msg">連接接口失敗</div>`;
            }

            sendBtn.disabled = false;
            inputField.disabled = false;
            inputField.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
