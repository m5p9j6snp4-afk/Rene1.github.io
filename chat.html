<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 毒舌助手</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #chat { width: 100%; max-width: 400px; height: 300px; background: #000; border: 1px solid #444; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 15px; color: #ff5555; }
        input { width: 100%; max-width: 400px; padding: 12px; border-radius: 20px; border: none; margin-bottom: 10px; }
        button { padding: 10px 20px; border-radius: 20px; border: none; background: #343a40; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <h3>AI 毒舌助手</h3>
    <div id="chat">AI: 又来送骂？快说吧，我准备好了。</div>
    <input type="text" id="userInput" placeholder="输入你想说的...">
    <button onclick="getReply()">发送</button>
    <br><a href="index.html" style="color: #666;">返回首页</a>

    <script>
        async function getReply() {
            const input = document.getElementById('userInput').value;
            const chat = document.getElementById('chat');
            const workerUrl = "https://lively-darkness-2561.bmk4byvf9b.workers.dev/"; 

            if(!input) return;
            chat.innerHTML += "<div>我: " + input + "</div>";
            document.getElementById('userInput').value = "...";

            try {
                const response = await fetch(workerUrl, {
                    method: 'POST',
                    body: JSON.stringify({ message: input })
                });
                const data = await response.json();
                chat.innerHTML += "<div style='color:#fff;'>AI: " + data.reply + "</div>";
            } catch (e) {
                chat.innerHTML += "<div style='color:red;'>连接失败，请检查 Worker 设置。</div>";
            }
            document.getElementById('userInput').value = "";
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
