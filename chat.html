<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 专属AI管家</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f0d890;
            --gold-border: rgba(212, 175, 55, 0.25);
            --royal-black: #020205;
            --royal-dark: #0a0a12;
            --royal-gray: #16161f;
            --platinum: #e5e7eb;
            --glass-bg: rgba(10, 10, 18, 0.9);
        }

        body {
            font-family: "Noto Sans SC", "Montserrat", sans-serif;
            background-color: var(--royal-black);
            background-image: 
                radial-gradient(ellipse at 15% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 80%, rgba(158, 126, 34, 0.06) 0%, transparent 45%);
            color: var(--platinum);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            line-height: 1.6;
            animation: pageFade 0.8s ease-out forwards;
        }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes msgPop {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 标题样式 */
        h3 {
            font-size: 26px;
            font-weight: 500;
            color: var(--gold-primary);
            letter-spacing: 4px;
            margin-bottom: 24px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        /* 模式按钮区域 */
        .mode-box {
            width: 100%;
            max-width: 520px;
            margin-bottom: 18px;
        }
        .fixed-mode {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 功能按钮栏 */
        .func-bar, .quick-word {
            margin-bottom: 18px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 聊天窗口 */
        #chat {
            width: 100%;
            max-width: 520px;
            height: 420px;
            background: var(--royal-dark);
            border: 1px solid var(--gold-border);
            border-radius: 24px;
            padding: 22px;
            overflow-y: auto;
            margin-bottom: 12px;
            font-size: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.03);
        }

        /* 滚动条美化 */
        #chat::-webkit-scrollbar {
            width: 6px;
        }
        #chat::-webkit-scrollbar-thumb {
            background: var(--gold-border);
            border-radius: 3px;
        }
        #chat::-webkit-scrollbar-track {
            background: var(--royal-black);
        }

        /* 聊天气泡 */
        .msg-ai {
            background: var(--royal-gray);
            border: 1px solid rgba(229, 231, 235, 0.15);
            color: var(--platinum);
            padding: 12px 18px;
            border-radius: 16px 16px 16px 6px;
            max-width: 85%;
            margin: 10px 0;
            text-align: left;
            word-wrap: break-word;
            cursor: pointer;
            animation: msgPop 0.3s ease;
        }
        .msg-user {
            background: linear-gradient(135deg, #221f18, #3a3428);
            border: 1px solid var(--gold-border);
            color: var(--gold-light);
            padding: 12px 18px;
            border-radius: 16px 16px 6px 16px;
            max-width: 85%;
            margin: 10px 0 10px auto;
            text-align: left;
            word-wrap: break-word;
            animation: msgPop 0.3s ease;
        }

        .msg-time {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 6px;
            display: block;
        }
        .loading {
            color: rgba(229, 231, 235, 0.5);
            margin: 10px 0;
            padding-left: 10px;
            animation: msgPop 0.3s ease;
        }
        .error-msg {
            color: #f87171;
            margin: 10px 0;
            animation: msgPop 0.3s ease;
        }

        /* 字数统计 */
        .count-text {
            width: 100%;
            max-width: 520px;
            text-align: right;
            font-size: 12px;
            opacity: 0.6;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        /* 输入框 */
        #userInput {
            width: 100%;
            max-width: 520px;
            padding: 16px 22px;
            border-radius: 30px;
            border: 1px solid var(--gold-border);
            background: var(--royal-dark);
            color: var(--platinum);
            margin-bottom: 10px;
            font-size: 15px;
            outline: none;
            transition: all 0.4s ease;
        }
        #userInput:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }
        #userInput:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 全局按钮样式 高端鎏金风 */
        button {
            padding: 11px 20px;
            font-size: 14px;
            border-radius: 30px;
            border: 1px solid var(--gold-border);
            background: var(--glass-bg);
            color: var(--platinum);
            cursor: pointer;
            font-weight: 400;
            letter-spacing: 1px;
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            backdrop-filter: blur(8px);
        }
        button:hover:not(:disabled) {
            border-color: var(--gold-primary);
            color: var(--gold-light);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 15px rgba(212, 175, 55, 0.1);
        }
        button:active:not(:disabled) {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* 选中状态按钮高亮 */
        .active-btn {
            background: linear-gradient(135deg, #221f18, #3a3428) !important;
            border-color: var(--gold-primary) !important;
            color: var(--gold-light) !important;
        }

        /* 返回链接 */
        a {
            margin-top: 24px;
            color: rgba(229, 231, 235, 0.6);
            text-decoration: none;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        a:hover {
            color: var(--gold-primary);
        }

        /* 复制提示 */
        .copy-tip {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--royal-gray);
            border: 1px solid var(--gold-border);
            color: var(--platinum);
            padding: 8px 20px;
            border-radius: 24px;
            font-size: 14px;
            display: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <h3>專屬 AI 管家</h3>

    <div class="mode-box">
        <div class="fixed-mode" id="fixedMode">
            <button onclick="setMode('hamburger')" id="hamburger-btn">漢堡模式(高冷</button>
            <button onclick="setMode('fries')" id="fries-btn">薯條模式(安慰</button>
            <button onclick="setMode('cone')" id="cone-btn">甜筒模式(正常聊天</button>
        </div>
    </div>

    <div class="func-bar">
        <button onclick="clearChat()">清空對話</button>
        <button onclick="toggleVoice()">語音朗讀：開</button>
    </div>

    <div class="quick-word">
        <button onclick="fillWord('你好')">你好</button>
        <button onclick="fillWord('謝謝')">謝謝</button>
        <button onclick="fillWord('再見')">再見</button>
    </div>

    <div id="chat"></div>

    <div class="count-text" id="countText">0 / 200</div>

    <input type="text" id="userInput" placeholder="輸入消息，回車發送"
           onkeydown="if(event.keyCode===13) getReply()" oninput="calcLength()">

    <div class="func-bar">
        <button onclick="getReply()" id="sendBtn">發送</button>
    </div>

    <a href="index.html">⬅️ 返回會員專區</a>

    <div class="copy-tip" id="copyTip">複製成功</div>

    <script>
        let currentMode = 'hamburger';
        let chatHistory = [];
        let voiceOpen = true;

        const MAX_INPUT_LENGTH = 200;
        const MAX_HISTORY = 12;
        const TYPE_SPEED = 40;
        const chatBox = document.getElementById('chat');
        const inputField = document.getElementById('userInput');
        const copyTip = document.getElementById('copyTip');
        const sendBtn = document.getElementById('sendBtn');
        const countText = document.getElementById('countText');
        const workerUrl = `https://lively-darkness-2561.bmk4byvf9b.workers.dev/?mode=`;

        function getTimeStr() {
            const d = new Date();
            return `${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}`;
        }

        window.addEventListener('load', () => {
            const lastMode = localStorage.getItem("lastMode") || "hamburger";
            const localHis = localStorage.getItem("chatHistory");
            if (localHis) {
                chatHistory = JSON.parse(localHis);
                renderHistory();
            }
            setMode(lastMode);
            window.addEventListener("online", checkNetwork);
            window.addEventListener("offline", checkNetwork);
            checkNetwork();
        });

        function checkNetwork() {
            if (!navigator.onLine) {
                chatBox.innerHTML += `<div class="error-msg">⚠️ 網絡離線，暫無法使用</div>`;
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        function toggleVoice() {
            voiceOpen = !voiceOpen;
            event.target.innerText = voiceOpen ? "語音朗讀：開" : "語音朗讀：關";
        }

        function fillWord(txt) {
            inputField.value = txt;
            calcLength();
        }

        function calcLength() {
            const len = inputField.value.length;
            countText.innerText = `${len} / ${MAX_INPUT_LENGTH}`;
        }

        function renderHistory() {
            chatBox.innerHTML = "";
            chatHistory.forEach(item => {
                const time = item.time || "";
                if (item.role === "user") {
                    chatBox.innerHTML += `
                        <div class="msg-user">
                            ${item.content}
                            <span class="msg-time">${time}</span>
                        </div>`;
                } else {
                    chatBox.innerHTML += `
                        <div class="msg-ai" onclick="copyMsg(this)">
                            ${item.content}
                            <span class="msg-time">${time}</span>
                        </div>`;
                }
            })
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function setMode(mode) {
            currentMode = mode;
            localStorage.setItem("lastMode", mode);
            chatHistory = [];
            localStorage.removeItem("chatHistory");

            // 按钮选中高亮
            document.querySelectorAll('.fixed-mode button').forEach(btn => {
                btn.classList.remove('active-btn');
            });
            if(mode === 'hamburger') document.getElementById('hamburger-btn').classList.add('active-btn');
            if(mode === 'fries') document.getElementById('fries-btn').classList.add('active-btn');
            if(mode === 'cone') document.getElementById('cone-btn').classList.add('active-btn');

            let welcome = "";
            switch (mode) {
                case "hamburger":
                    welcome = "我是漢堡，想和我聊什麼";
                    break;
                case "fries":
                    welcome = "我是薯條，隨時陪伴您交流。";
                    break;
                case "cone":
                    welcome = "我是甜筒，很高興與您相識😊";
                    break;
            }
            chatBox.innerHTML = `<div class="msg-ai" onclick="copyMsg(this)">${welcome}<span class="msg-time">${getTimeStr()}</span></div>`;
        }

        function clearChat() {
            if (!confirm("確定清空所有對話記錄？")) return;
            chatHistory = [];
            localStorage.removeItem("chatHistory");
            setMode(currentMode);
        }

        function copyMsg(el) {
            const text = el.innerText.replace(/\d{2}:\d{2}$/, '').trim();
            navigator.clipboard.writeText(text).then(() => {
                copyTip.style.display = "block";
                setTimeout(() => copyTip.style.display = "none", 1200);
            }).catch(() => alert("複製失敗"));

            if (voiceOpen && window.speechSynthesis) {
                speechSynthesis.cancel();
                const utter = new SpeechSynthesisUtterance(text);
                utter.lang = "zh-CN";
                utter.rate = 1;
                speechSynthesis.speak(utter);
            }
        }

        async function typeWriter(box, text) {
            box.innerHTML = "";
            for (let i = 0; i < text.length; i++) {
                box.innerHTML += text[i];
                chatBox.scrollTop = chatBox.scrollHeight;
                await new Promise(res => setTimeout(res, TYPE_SPEED));
            }
        }

        async function getReply() {
            if (!navigator.onLine) {
                alert("網絡離線，無法發送消息");
                return;
            }
            let input = inputField.value.trim();
            if (input.length > MAX_INPUT_LENGTH) {
                alert(`消息最大 ${MAX_INPUT_LENGTH} 字`);
                return;
            }
            if (!input) return;

            sendBtn.disabled = true;
            inputField.disabled = true;

            if (chatHistory.length > MAX_HISTORY) {
                chatHistory = chatHistory.slice(-MAX_HISTORY);
            }

            const nowTime = getTimeStr();
            chatBox.innerHTML += `
                <div class="msg-user">
                    ${input}
                    <span class="msg-time">${nowTime}</span>
                </div>`;
            const loadingDom = document.createElement("div");
            loadingDom.className = "loading";
            loadingDom.innerText = "AI 思考中...";
            chatBox.appendChild(loadingDom);
            inputField.value = "";
            calcLength();
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                let postData = { message: input, history: chatHistory };
                const res = await fetch(workerUrl + currentMode, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(postData)
                });
                const data = await res.json();
                chatBox.removeChild(loadingDom);

                if (data.reply) {
                    const aiBox = document.createElement("div");
                    aiBox.className = "msg-ai";
                    aiBox.onclick = function () { copyMsg(this); };
                    chatBox.appendChild(aiBox);
                    await typeWriter(aiBox, data.reply);
                    aiBox.innerHTML += `<span class="msg-time">${nowTime}</span>`;

                    chatHistory.push({ role: "user", content: input, time: nowTime });
                    chatHistory.push({ role: "assistant", content: data.reply, time: nowTime });
                    localStorage.setItem("chatHistory", JSON.stringify(chatHistory));

                    document.title = "✨ 收到新回覆";
                    setTimeout(() => document.title = "Rene 專屬AI管家", 2000);
                } else if (data.error) {
                    chatBox.innerHTML += `<div class="error-msg">錯誤：${data.error}</div>`;
                }
            } catch (e) {
                chatBox.removeChild(loadingDom);
                chatBox.innerHTML += `<div class="error-msg">連接接口失敗</div>`;
            }

            sendBtn.disabled = false;
            inputField.disabled = false;
            inputField.focus();
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
