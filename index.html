<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属高级主页</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }

        /* ✨ 左上角背景音乐图标样式 */
        .music-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* 旋转动画特效 */
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 当音乐播放时，让图标转起来 */
        .music-btn.playing {
            animation: rotate 3s linear infinite;
        }

        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 380px; 
            width: 100%;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        h1 { color: #2d3748; margin: 10px 0; font-size: 26px; }
        .bio { color: #718096; font-size: 15px; line-height: 1.6; margin-bottom: 30px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: block; padding: 14px; background: #667eea; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); transition: all 0.2s ease;
        }
        .btn:hover { background: #5a6fd6; box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>

    <div class="music-btn" id="musicBtn" onclick="toggleMusic()">🎵</div>

    <audio id="bgMusic" loop src="https://music.163.com/song/media/outer/url?id=2623351336.mp3"></audio>

    <div class="card">
        <img src="toto01.JPG" alt="头像" class="avatar">
        
        <h1>Rene 的空间 ✨</h1>
        
        <p class="bio">📱 100% 独立，完完全全属于我自己。<br>点按屏幕任意地方开启背景音乐 🎧</p>
        
        <div class="btn-group">
            <a href="about.html" class="btn">👉 去看看“关于我”页面</a>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const btn = document.getElementById('musicBtn');

        // 核心功能：点击左上角图标切换播放/暂停
        function toggleMusic() {
            if (music.paused) {
                music.play();
                btn.classList.add('playing');
                btn.innerText = '🎵';
            } else {
                music.pause();
                btn.classList.remove('playing');
                btn.innerText = '🔇'; // 关掉时变成静音图标
            }
        }

        // 突破浏览器限制：用户一进入网页，只要用手指点屏幕任意地方，音乐就会悄悄启动
        document.body.addEventListener('click', function() {
            if (music.paused && !btn.classList.contains('clicked')) {
                music.play().then(() => {
                    btn.classList.add('playing');
                    btn.classList.add('clicked');
                }).catch(err => console.log("等待用户交互"));
            }
        }, { once: true }); // once: true 表示这个点击自动播放的功能只触发一次，后面不干扰用户
    </script>

</body>
</html>
