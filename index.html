<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene 的专属主页</title>
    <style>
        /* 绚丽的高级渐变背景 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        /* 磨砂玻璃质感的个人主页卡片 */
        .card { 
            background: rgba(255, 255, 255, 0.88); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 25px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 360px; 
            width: 100%;
        }
        /* 头像精致边框 */
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 15px;
        }
        h1 { 
            color: #2d3748; 
            margin: 5px 0 20px 0;
            font-size: 24px;
        }
        /* 三段式胶囊按钮组合空间 */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        /* 通用按钮基础样式 */
        .btn { 
            display: block;
            padding: 15px; 
            color: white; 
            text-decoration: none; 
            border-radius: 14px; 
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s ease;
        }
        /* 第一个按钮：介绍自己（知性深邃灰） */
        .btn-about {
            background: #4a5568;
            box-shadow: 0 4px 12px rgba(74, 85, 104, 0.3);
        }
        .btn-about:hover {
            background: #2d3748;
            transform: translateY(-2px);
        }
        /* 中间第二个按钮：朋友圈动态（高级优雅紫） */
        .btn-moments {
            background: #805ad5;
            box-shadow: 0 4px 12px rgba(128, 90, 213, 0.3);
        }
        .btn-moments:hover {
            background: #6b46c1;
            transform: translateY(-2px);
        }
        /* 最下方第三个按钮：喜欢的音乐（动感活力红） */
        .btn-music { 
            background: #e53e3e; 
            box-shadow: 0 4px 12px rgba(229, 62, 62, 0.3);
        }
        .btn-music:hover { 
            background: #c53030; 
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- 你的专属头像 -->
        <img src="toto01.JPG" alt="头像" class="avatar">
        
        <h1>Rene 的空间 ✨</h1>
        
        <!-- 三段式功能传送门 -->
        <div class="btn-group">
            
            <!-- 1. 第一个：介绍自己 -->
            <a href="about.html" class="btn btn-about">👤 第一步：关于我（了解 Rene）</a>
            
            <!-- 2. 中间：朋友圈（已精准连接到你的 moments.html 网页） -->
            <a href="moments.html" class="btn btn-moments">📸 第二步：朋友圈（日常动态碎片）</a>
            
            <!-- 3. 最下面：喜欢的音乐（精准连接到你的网易云最新歌单） -->
            <a href="https://163cn.tv/7SbEBgb" class="btn btn-music" target="_blank">🎵 第三步：Rren-_-喜欢的音乐</a>
            
        </div>
    </div>

</body>
</html>
