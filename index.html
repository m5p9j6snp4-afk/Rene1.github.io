<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Center | 小空间</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --main-blue: #5096ff;
            --bg-dark: #1c1f26;
            --card-bg: #272b35;
            --text: #f1f3f9;
            --text-gray: #a0a8b8;
            --border: rgba(80,150,255,0.2);
            --warn: #ff7777;
        }

        body {
            font-family: "Noto Sans SC", "Montserrat", sans-serif;
            background-color: var(--bg-dark);
            min-height: 100vh;
            color: var(--text);
            padding: 30px 16px;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
        }

        .header-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px 26px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom:16px;
            border:1px solid var(--border);
        }
        .header-left h1 {
            font-size:22px;font-weight:500;color:var(--text);margin-bottom:4px;
        }
        .sub-title {
            font-size:13px;color:var(--text-gray);
        }
        .countdown {
            font-size:14px;color:var(--main-blue);background:rgba(80,150,255,.08);padding:8px 12px;border-radius:10px;
        }

        .info-row{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
            margin-bottom:16px;
        }
        .info-card{
            background:var(--card-bg);
            border:1px solid var(--border);
            border-radius:14px;
            padding:16px;
            text-align:center;
        }
        .info-title{
            font-size:12px;
            color:var(--text-gray);
            margin-bottom:6px;
        }
        .info-text{
            font-size:15px;
            color:var(--main-blue);
            font-weight:500;
        }

        /*世界时钟样式*/
        .time-box{
            background:var(--card-bg);
            border:1px solid var(--border);
            border-radius:16px;
            padding:20px;
            margin-bottom:24px;
        }
        .local-time{
            font-size:22px;
            color:var(--main-blue);
            margin-bottom:16px;
            text-align:center;
        }
        .world-wrap{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:12px;
        }
        .world-item{
            background:rgba(0,0,0,0.25);
            padding:12px;
            border-radius:10px;
            text-align:center;
        }
        .city{
            font-size:13px;
            color:var(--text-gray);
            margin-bottom:4px;
        }
        .ctime{
            font-size:16px;
        }
        .full-col{
            grid-column:1/-1;
        }

        .btn-wrap {
            display:grid;
            grid-template-columns: repeat(auto-fit,minmax(160px,1fr));
            gap:12px;
            margin-bottom:26px;
        }
        .btn {
            padding:15px 10px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--text);text-decoration:none;text-align:center;font-size:14px;transition:.25s;
        }
        .btn:hover {
            background:rgba(80,150,255,.07);border-color:var(--main-blue);
        }
        .btn-vip {color:var(--main-blue);}

        /*英文格言卡片*/
        .quote-card{
            background:var(--card-bg);
            border:1px solid var(--border);
            border-radius:16px;
            padding:20px;
            text-align:center;
        }
        .quote-tit{
            font-size:13px;color:var(--text-gray);margin-bottom:8px;
        }
        .quote-text{
            font-size:15px;color:var(--main-blue);font-style:italic;
        }
    </style>
</head>
<body>
    <!-- 会员主页直接展示 -->
    <div class="container">
        <div class="header-card">
            <div class="header-left">
                <h1>个人中心</h1>
                <div class="sub-title">MEMBER AREA</div>
            </div>
            <div class="countdown" id="timer">活动倒计时加载中...</div>
        </div>

        <div class="info-row">
            <div class="info-card">
                <div class="info-title">🌐 网站存活时长</div>
                <div class="info-text" id="siteLive"></div>
            </div>
            <div class="info-card">
                <div class="info-title">✨ 今日状态运势</div>
                <div class="info-text" id="dayLuck"></div>
            </div>
        </div>

        <!--新增世界时钟模块-->
        <div class="time-box">
            <div class="local-time" id="localTime"></div>
            <div class="world-wrap">
                <div class="world-item">
                    <div class="city">🇭🇰 香港 UTC+8</div>
                    <div class="ctime" id="hk"></div>
                </div>
                <div class="world-item">
                    <div class="city">🇯🇵 东京 UTC+9</div>
                    <div class="ctime" id="tokyo"></div>
                </div>
                <div class="world-item">
                    <div class="city">🇬🇧 伦敦 UTC+0</div>
                    <div class="ctime" id="london"></div>
                </div>
                <div class="world-item">
                    <div class="city">🇺🇸 纽约 UTC-5</div>
                    <div class="ctime" id="newyork"></div>
                </div>
                <div class="world-item full-col">
                    <div class="city">🇦🇺 悉尼 UTC+10</div>
                    <div class="ctime" id="sydney"></div>
                </div>
            </div>
        </div>

        <div class="btn-wrap">
            <a href="about.html" class="btn">👤 个人资料</a>
            <a href="moments.html" class="btn">📸 动态分享</a>
            <a href="treehole.html" class="btn">🌙 私人树洞</a>
            <a href="https://ngl.link/rene25528" class="btn" target="_blank">📝 留言板</a>
            <a href="https://163cn.tv/7SbEBgb" class="btn" target="_blank">🎵 音乐收藏</a>
            <a href="game.html" class="btn">🎮 休闲专区</a>
            <a href="chat.html" class="btn">🤖 智能助手</a>
            <a href="pay.html" class="btn btn-vip">💳 会员续费 / 升级</a>
            <a href="anniversary.html" class="btn">📅 添加纪念日备忘</a>
        </div>

        <!--底部英文座右铭卡片-->
        <div class="quote-card">
            <div class="quote-tit">Daily English Motto</div>
            <div class="quote-text" id="enQuote"></div>
        </div>
    </div>

    <script>
        //建站起始日
        const siteStart = new Date("2026/05/27 00:00:00").getTime();
        //生日固定 8.24
        const birthMonth = 8;
        const birthDay = 24;

        const luckList = [
            "松弛自在，万事顺遂",
            "情绪稳定，好运常驻",
            "专注自我，步步安稳",
            "平平淡淡，即是圆满",
            "心态平和，事事从容",
            "向内扎根，默默成长",
            "保持热爱，静待花开",
            "今日适宜，温柔且坚定"
        ];

        //英文格言库
        const quoteArr = [
            "The future belongs to those who believe in the beauty of their dreams.",
            "Stay humble, stay hungry, keep moving forward.",
            "Small steps every day lead to big changes.",
            "Everything you’ve ever wanted is on the other side of fear.",
            "Grow through what you go through.",
            "Focus on progress not perfection.",
            "Be the reason someone smiles today.",
            "Hard work beats talent when talent doesn't work hard."
    "The future belongs to those who believe in the beauty of their dreams.",
    "Stay humble, stay hungry, keep moving forward.",
    "Small steps every day lead to big changes.",
    "Everything you’ve ever wanted is on the other side of fear.",
    "Grow through what you go through.",
    "Focus on progress not perfection.",
    "Be the reason someone smiles today.",
    "Hard work beats talent when talent doesn't work hard.",
    "Never give up on something you can’t go a day without thinking about.",
    "Your only limit is the mind you build yourself.",
    "Quiet progress is still progress.",
    "Chase your dreams quietly, let success make noise.",
    "Start where you are, use what you have, do what you can.",
    "Patience is not waiting, but keeping a good attitude while waiting.",
    "Mistakes are proof you are trying.",
    "Life is about making an impact, not making an income.",
    "Don’t count the days, make the days count.",
    "Believe you can and you’re halfway there.”,
        ];

        window.onload = function(){
            updateTimer();
            setInterval(updateTimer,1000);
            updateSiteTime();
            getTodayLuck();
            updateClock();
            setInterval(updateClock,1000);
            //随机一句英文
            let ranQ = Math.floor(Math.random()*quoteArr.length);
            document.getElementById("enQuote").innerText = quoteArr[ranQ];
        }

        //网站存活天数
        function updateSiteTime(){
            let now = Date.now();
            let diff = now - siteStart;
            let day = Math.floor(diff / (1000*60*60*24));
            let hour = Math.floor((diff % (1000*60*60*24)) / (1000*60*60));
            document.getElementById("siteLive").innerText = `已陪伴 ${day}天 ${hour}小时`;
        }

        //生日判断+运势
        function getTodayLuck(){
            const nowDate = new Date();
            const m = nowDate.getMonth()+1;
            const d = nowDate.getDate();
            const todayStr = nowDate.toLocaleDateString();
            let saveDay = localStorage.getItem("luckDay");
            let saveLuck = localStorage.getItem("luckText");

            //生日当天固定文案
            if(m === birthMonth && d === birthDay){
                let birthText = "生辰喜乐，万事顺心，专属好运全天在线";
                document.getElementById("dayLuck").innerText = birthText;
                localStorage.setItem("luckDay",todayStr);
                localStorage.setItem("luckText",birthText);
                return;
            }

            if(saveDay === todayStr && saveLuck){
                document.getElementById("dayLuck").innerText = saveLuck;
            }else{
                let ran = Math.floor(Math.random()*luckList.length);
                let res = luckList[ran];
                localStorage.setItem("luckDay",todayStr);
                localStorage.setItem("luckText",res);
                document.getElementById("dayLuck").innerText = res;
            }
        }

        //生日倒计时
        function updateTimer() {
            const targetDate = new Date("2026/08/24 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;
            if (difference <= 0) {
                document.getElementById('timer').innerHTML = "🎉 生日快乐 🎉";
                return;
            }
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `🎁 距离生日：${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }

        //世界时钟函数
        function updateClock(){
            const now=new Date();
            const week=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
            //本地完整时间
            let localStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${week[now.getDay()]} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            document.getElementById('localTime').innerText=localStr;

            //时区换算
            const getZoneTime = (offsetHour)=>{
                let t = new Date(now.getTime() + offsetHour * 3600000);
                return `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;
            }
            document.getElementById('hk').innerText=getZoneTime(0);
            document.getElementById('tokyo').innerText=getZoneTime(1);
            document.getElementById('london').innerText=getZoneTime(-8);
            document.getElementById('newyork').innerText=getZoneTime(-13);
            document.getElementById('sydney').innerText=getZoneTime(2);
        }
    </script>
</body>
</html>
