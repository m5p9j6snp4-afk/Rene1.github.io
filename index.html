<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的专属高级主页</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px 30px; 
            border-radius: 24px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); 
            max-width: 380px; 
            width: 100%;
            transition: transform 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            margin-bottom: 20px;
        }
        h1 { color: #2d3748; margin: 10px 0; font-size: 26px; }
        .bio { color: #718096; font-size: 15px; line-height: 1.6; margin-bottom: 25px; }
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            display: block; padding: 14px; background: #667eea; color: white; 
            text-decoration: none; border-radius: 12px; font-weight: 600; font-size: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); transition: all 0.2s ease;
        }
        .btn:hover { background: #5a6fd6; box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4); }
    </style>
</head>
<body>

    <div class="card">
        <!-- 你的专属头像 -->
        <img src="toto01.JPG" alt="头像" class="avatar">
        
        <h1>Rene 的空间 ✨</h1>
        
        <p class="bio">📱 100% 独立，完完全全属于我自己。<br>这里是我存放音乐与生活的小宇宙。</p>

        <!-- 🎵 卢广仲《太阳与地球》官方半透明播放卡片 -->
        <!-- 这个是由网易云官方服务器直接渲染的，绝对不会被浏览器当成垃圾垃圾拦截，点一下就能播！ -->
        <iframe border="0" frameborder="no" marginwidth="0" marginheight="0" width="100%" height="86" src="//music.163.com/outchain/player?type=2&id=2623351336&auto=0&height=66" style="margin-bottom: 25px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.05);"></iframe>
        
        <div class="btn-group">
            <a href="about.html" class="btn">👉 去看看“关于我”页面</a>
        </div>
    </div>

</body>
</html>
