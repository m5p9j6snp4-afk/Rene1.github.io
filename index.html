<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene的空間</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); text-align: center; max-width: 350px; width: 100%; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; }
        h1 { color: #333; margin-bottom: 20px; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { display: block; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; transition: background 0.3s; cursor: pointer; border: none; font-size: 16px; text-align: center; }
        .btn:hover { background: #0056b3; }
        /* 新增：游戏按钮专属样式 */
        .btn-game { background: #6f42c1; }
        .btn-game:hover { background: #5a32a3; }
        .countdown { font-size: 14px; color: #666; margin-bottom: 15px; background: #e9ecef; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <div class="countdown" id="timer">⏰ 倒計時加載中...</div>
        <img src="tx.JPG.JPG" alt="头像" class="avatar">
        <h1>Rene 的空間</h1>
        
        <div class="btn-group">
            <a href="about.html" class="btn">👤 第一步：關於我</a>
            <a href="moments.html" class="btn">📸 第二步：朋友圈</a>
            <a href="https://ngl.link/rene25528" class="btn" target="_blank" style="background: #28a745;">📝 第三步：留言（想告訴我秘密？點這裡）</a>
            <a href="https://163cn.tv/7SbEBgb" class="btn" target="_blank">🎵 第四步：喜歡的音樂</a>
            
            <!-- 【新增】第五步：游戏室入口 -->
            <a href="game.html" class="btn btn-game">🎮 第五步：互動遊戲室</a>

<!-- 【新增】第六步：AI 互動 -->
<a href="ai.html" class="btn" style="background: #343a40;">🤖 第六步：AI 助手</a>

        </div>
    </div>

    <script>
        function updateTimer() {
            const targetDate = new Date("2026/08/24 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;
            if (difference <= 0) { document.getElementById('timer').innerHTML = "🎉 Rene 生日快乐！！🍻"; return; }
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `🎁 距離Rene生日轟趴還有：${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }
        setInterval(updateTimer, 1000); updateTimer();
    </script>
</body>
</html>
