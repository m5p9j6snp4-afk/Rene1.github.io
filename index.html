<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rene's Moments</title>
    <!-- 引入 FastComments 评论系统 -->
    <script async src="https://cdn.fastcomments.com/js/embed-v2-async.min.js"></script>
    <style>
        :root { --bg: #f8f9fa; --card-bg: #ffffff; --text-main: #1a1a1a; --text-light: #8e8e93; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px 0; color: var(--text-main); }
        .container { max-width: 480px; margin: 0 auto; }
        .moment-card { background: var(--card-bg); padding: 20px; margin-bottom: 12px; border-radius: 8px; }
        .moment-time { font-size: 11px; color: var(--text-light); margin-bottom: 8px; display: block; }
        .moment-content { font-size: 15px; line-height: 1.5; margin-bottom: 12px; }
        .moment-img { width: 150px; height: 150px; object-fit: cover; border-radius: 6px; margin-bottom: 12px; display: block; }
        .fastcomments-wrapper { margin-top: 10px; }
    </style>
    <script>
        window.fcConfigs = [{ "tenantId": "pbN5Owiw1B1" }];
    </script>
</head>
<body>
<div class="container">
    <!-- 动态 1 -->
    <div class="moment-card">
        <span class="moment-time">14:30</span>
        <div class="moment-content">好饱好饱</div>
        <img src="图片名.jpg" class="moment-img" onerror="this.style.display='none'">
        <div id="fastcomments-widget-1" class="fastcomments-wrapper"></div>
    </div>
    
    <!-- 动态 2 -->
    <div class="moment-card">
        <span class="moment-time">12:06</span>
        <div class="moment-content">时间好慢，好饿。</div>
        <img src="图片名.jpg" class="moment-img" onerror="this.style.display='none'">
        <div id="fastcomments-widget-2" class="fastcomments-wrapper"></div>
    </div>
</div>
</body>
</html>
