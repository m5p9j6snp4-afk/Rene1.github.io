<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RENÉ | PRIVATE EXCLUSIVE MEMBER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f0d890;
            --gold-deep: #9e7e22;
            --platinum: #e5e7eb;
            --royal-black: #020205;
            --royal-dark: #0a0a12;
            --glass-gold: rgba(212, 175, 55, 0.1);
            --border-gold: rgba(212, 175, 55, 0.25);
        }

        body {
            font-family: "Noto Sans SC", "Montserrat", serif;
            background-color: var(--royal-black);
            background-image: 
                radial-gradient(ellipse at 15% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 80%, rgba(158, 126, 34, 0.06) 0%, transparent 45%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4af37' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px 15px;
            padding-bottom: 40px;
            color: var(--platinum);
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 30% 40%, rgba(212, 175, 55, 0.12) 0%, transparent 35%),
                radial-gradient(circle at 70% 60%, rgba(158, 126, 34, 0.08) 0%, transparent 40%);
            animation: nobleGlow 18s ease-in-out infinite alternate;
            z-index: -2;
        }

        @keyframes nobleGlow {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .card {
            background: linear-gradient(145deg, rgba(10,10,18,0.95), rgba(2,2,5,0.98));
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border: 1px solid var(--border-gold);
            border-radius: 32px;
            padding: 30px 25px;
            box-shadow: 
                0 30px 100px rgba(0, 0, 0, 0.8),
                0 12px 40px rgba(0, 0, 0, 0.6),
                inset 0 1px 0 rgba(255, 255, 255, 0.05),
                0 0 60px rgba(212, 175, 55, 0.08);
            text-align: center;
            max-width: 460px;
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            animation: royalEnter 1.2s ease-out forwards;
        }

        .card::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.18), transparent);
            animation: goldenStream 12s linear infinite;
        }

        @keyframes goldenStream {
            0% { left: -150%; }
            100% { left: 150%; }
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 
                0 40px 120px rgba(0, 0, 0, 0.85),
                0 16px 48px rgba(0, 0, 0, 0.7),
                0 0 80px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.35);
        }

        @keyframes royalEnter {
            from { opacity: 0; transform: translateY(50px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 20px;
            border: 2px solid var(--border-gold);
            box-shadow: 
                0 0 0 6px rgba(212, 175, 55, 0.1),
                0 0 40px rgba(212, 175, 55, 0.2),
                0 0 80px rgba(158, 126, 34, 0.08);
            transition: all 0.5s ease;
            position: relative;
        }

        .avatar:hover {
            transform: scale(1.08);
            box-shadow: 
                0 0 0 6px rgba(212, 175, 55, 0.22),
                0 0 55px rgba(212, 175, 55, 0.38),
                0 0 100px rgba(158, 126, 34, 0.15);
        }

        h1 {
            font-size: 26px;
            font-weight: 500;
            letter-spacing: 6px;
            color: var(--gold-primary);
            margin-bottom: 6px;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.25), 0 2px 10px #000;
        }
        .sub-title {
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 3px;
            color: var(--platinum);
            opacity: 0.7;
            margin-bottom: 25px;
        }

        .countdown {
            font-size: 14px;
            font-weight: 300;
            color: var(--platinum);
            opacity: 0.8;
            background: rgba(0, 0, 0, 0.35);
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid rgba(212, 175, 55, 0.12);
            letter-spacing: 1px;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.6);
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .btn {
            display: block;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 500;
            font-size: 15px;
            letter-spacing: 1.5px;
            text-align: center;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            text-transform: uppercase;
        }

        .btn::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
            border-radius: 20px;
            pointer-events: none;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -120%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.25), transparent);
            transition: left 0.8s ease;
        }

        .btn:hover::after {
            left: 120%;
        }

        .btn:hover {
            transform: translateY(-5px);
        }
        .btn:active {
            transform: translateY(2px);
        }

        .btn-normal {
            background: linear-gradient(135deg, #221f18, #3a3428);
            border: 1px solid var(--border-gold);
        }
        .btn-normal:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.35);
        }

        .btn-msg {
            background: linear-gradient(135deg, #182722, #243b32);
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
        .btn-msg:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.35);
        }

        .btn-game {
            background: linear-gradient(135deg, #231c2e, #372d4a);
            border: 1px solid rgba(139, 92, 246, 0.25);
        }
        .btn-game:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(139, 92, 246, 0.15);
            border-color: rgba(139, 92, 246, 0.35);
        }

        .btn-ai {
            background: linear-gradient(135deg, #12151c, #202633);
            border: 1px solid rgba(229, 231, 235, 0.2);
        }
        .btn-ai:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(229, 231, 235, 0.1);
            border-color: rgba(229, 231, 235, 0.3);
        }

        /* 付费按钮 专属鎏金高亮款 */
        .btn-pay {
            background: linear-gradient(135deg, #4b3c1e, #8c6d2f);
            border: 1px solid var(--gold-primary);
        }
        .btn-pay:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 25px rgba(212, 175, 55, 0.25);
            border-color: var(--gold-light);
        }

        .btn-logout {
            background: linear-gradient(135deg, #2b1717, #422222);
            border: 1px solid rgba(239, 68, 68, 0.25);
            margin-top: 12px;
        }
        .btn-logout:hover {
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.35);
        }

        .login-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            z-index: 9999;
        }

        .login-box {
            background: linear-gradient(145deg, rgba(10,10,18,0.96), rgba(2,2,5,0.99));
            backdrop-filter: blur(32px) saturate(200%);
            -webkit-backdrop-filter: blur(32px) saturate(200%);
            border: 1px solid var(--border-gold);
            border-radius: 28px;
            padding: 35px 25px;
            text-align: center;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 32px 100px rgba(0,0,0,0.85), 0 0 60px rgba(212, 175, 55, 0.1);
            animation: noblePop 1s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            position: relative;
            overflow: hidden;
        }

        .login-box::after {
            content: "";
            position: absolute;
            top: 0;
            left: -150%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.12), transparent);
            animation: goldenStream 14s linear infinite;
        }

        @keyframes noblePop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .login-box h2 {
            color: var(--gold-primary);
            font-weight: 500;
            margin-bottom: 25px;
            letter-spacing: 4px;
            font-size: 22px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .login-box input {
            width: 100%;
            padding: 15px 18px;
            margin: 12px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 20px;
            font-size: 16px;
            color: var(--platinum);
            outline: none;
            transition: all 0.5s ease;
            letter-spacing: 1px;
        }

        .login-box input::placeholder {
            color: rgba(229, 231, 235, 0.5);
        }

        .login-box input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 6px rgba(212, 175, 55, 0.1), 0 0 25px rgba(212, 175, 55, 0.15);
            background: rgba(0,0,0,0.4);
        }

        .login-box button {
            padding: 13px 30px;
            margin: 12px 8px 0;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.5s ease;
            font-weight: 500;
            letter-spacing: 1.5px;
        }

        .login-box .login-btn {
            background: linear-gradient(135deg, #221f18, #3a3428);
            color: var(--gold-light);
            border: 1px solid var(--border-gold);
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        }

        .login-box .switch-btn {
            background: rgba(0,0,0,0.35);
            color: var(--platinum);
            border: 1px solid rgba(212, 175, 55, 0.15);
        }

        .login-box button:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .tip {
            color: #f87171;
            font-size: 14px;
            margin-top: 16px;
            height: 26px;
            letter-spacing: 0.8px;
        }

        .main-content {
            display: none;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="loginMask" class="login-mask">
        <div class="login-box">
            <div id="loginTitle"><h2>專屬會員驗證</h2></div>
            <input type="text" id="username" placeholder="請輸入專屬會員賬號">
            <input type="password" id="pwd" placeholder="請輸入會員密碼">
            <p class="tip" id="msgTip"></p>
            <button class="login-btn" onclick="doLogin()">會員登錄</button>
            <button class="switch-btn" onclick="switchMode()">註冊專屬賬號</button>
        </div>
    </div>

    <div class="main-content" id="mainBox">
        <div class="card">
            <div class="countdown" id="timer">⏰ 專屬倒計時加載中...</div>
            <img src="tx.JPG.JPG" alt="Exclusive Avatar" class="avatar">
            <h1>Rene 的空間</h1>
            <div class="sub-title">EXCLUSIVE PRIVATE MEMBER AREA</div>
            
            <div class="btn-group">
                <a href="about.html" class="btn btn-normal">👤 專屬檔案</a>
                <a href="moments.html" class="btn btn-normal">📸 私人動態</a>
                <a href="https://ngl.link/rene25528" class="btn btn-msg" target="_blank">📝 私密留言</a>
                <a href="https://163cn.tv/7SbEBgb" class="btn btn-normal" target="_blank">🎵 典藏音樂</a>
                <a href="game.html" class="btn btn-game">🎮 尊享娛樂</a>
                <a href="chat.html" class="btn btn-ai">🤖 專屬AI管家</a>
                <!-- 新增付费入口按钮 -->
                <a href="pay.html" class="btn btn-pay">💳 會員續費 / 升級</a>
            </div>
            <button class="btn btn-logout" onclick="logout()">🚪 退出會員專區</button>
        </div>
    </div>

    <script>
        const needLogin = true;
        let isRegisterMode = false;

        const loginMask = document.getElementById('loginMask');
        const mainBox = document.getElementById('mainBox');
        const loginTitle = document.getElementById('loginTitle');
        const msgTip = document.getElementById('msgTip');

        window.onload = function(){
            updateTimer();
            setInterval(updateTimer, 1000);

            const loginStatus = localStorage.getItem("siteLogin");
            const userAccount = localStorage.getItem("regUser");
            const userPwd = localStorage.getItem("regPwd");

            if(!needLogin){
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
                return;
            }

            if(loginStatus === "ok" && userAccount && userPwd){
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
            }else{
                loginMask.classList.remove("hide");
                mainBox.style.display = "none";
            }
        };

        function switchMode(){
            msgTip.innerText = "";
            isRegisterMode = !isRegisterMode;
            if(isRegisterMode){
                loginTitle.innerHTML = "<h2>開通專屬會員</h2>";
                document.querySelector(".switch-btn").innerText = "返回登錄";
            }else{
                loginTitle.innerHTML = "<h2>專屬會員驗證</h2>";
                document.querySelector(".switch-btn").innerText = "註冊專屬賬號";
            }
        }

        function doLogin(){
            const un = document.getElementById('username').value.trim();
            const pw = document.getElementById('pwd').value.trim();
            msgTip.innerText = "";

            if(!un || !pw){
                msgTip.innerText = "會員賬號與密碼不可為空";
                return;
            }

            const regUser = localStorage.getItem("regUser");
            const regPwd = localStorage.getItem("regPwd");

            if(isRegisterMode){
                if(regUser){
                    msgTip.innerText = "該會員賬號已被註冊";
                    return;
                }
                localStorage.setItem("regUser", un);
                localStorage.setItem("regPwd", pw);
                localStorage.setItem("siteLogin", "ok");
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
            }else{
                if(un === regUser && pw === regPwd){
                    localStorage.setItem("siteLogin", "ok");
                    loginMask.classList.add("hide");
                    mainBox.style.display = "block";
                }else{
                    msgTip.innerText = "賬號或密碼錯誤，拒絕訪問";
                }
            }
        }

        function logout(){
            localStorage.removeItem("siteLogin");
            location.reload();
        }

        function updateTimer() {
            const targetDate = new Date("2026/08/24 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;
            if (difference <= 0) {
                document.getElementById('timer').innerHTML = "🎉 尊貴會員，生日快樂 🎉";
                return;
            }
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `🎁 尊屬倒計時：距離專屬慶典 ${days}天 ${hours}時 ${minutes}分 ${seconds}秒`;
        }
    </script>
</body>
</html>
