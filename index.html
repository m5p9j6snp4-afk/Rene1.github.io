<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Center | 会员中心</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #c9a857;
            --dark-bg: #0f0f13;
            --card-bg: #17171e;
            --text-main: #e2e2e8;
            --text-light: #a8a8b3;
            --border: rgba(201, 168, 87, 0.2);
            --danger: #e57373;
        }

        body {
            font-family: "Noto Sans SC", "Montserrat", sans-serif;
            background-color: var(--dark-bg);
            min-height: 100vh;
            color: var(--text-main);
            padding: 40px 20px;
        }

        /* 全屏主容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部个人信息区 */
        .header-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px;
            text-align: center;
            margin-bottom: 30px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 24px;
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 24px;
            font-weight: 500;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 6px;
        }

        .sub-title {
            font-size: 13px;
            color: var(--text-light);
            letter-spacing: 2px;
            margin-bottom: 28px;
        }

        .countdown {
            font-size: 14px;
            color: var(--text-light);
            padding: 10px 14px;
            background: rgba(0,0,0,0.25);
            border-radius: 12px;
            display: inline-block;
        }

        /* 按钮区域 - 网格全屏排版 */
        .btn-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }

        .btn {
            display: block;
            padding: 18px 14px;
            color: var(--text-main);
            text-decoration: none;
            border-radius: 14px;
            font-size: 14px;
            letter-spacing: 1px;
            border: 1px solid var(--border);
            background: transparent;
            transition: 0.3s ease;
            cursor: pointer;
            text-align: center;
        }

        .btn:hover {
            background: rgba(201, 168, 87, 0.08);
            border-color: var(--gold);
        }

        .btn-pay {
            color: var(--gold);
        }

        .btn-logout {
            color: var(--danger);
            border-color: rgba(229, 115, 115, 0.2);
            max-width: 220px;
            margin: 0 auto;
        }

        .btn-logout:hover {
            background: rgba(229, 115, 115, 0.08);
            border-color: var(--danger);
        }

        /* 登录弹窗 */
        .login-mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 999;
        }

        .login-box {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 35px;
            width: 100%;
            max-width: 500px;
            text-align: center;
        }

        .login-box h2 {
            color: var(--gold);
            font-size: 20px;
            letter-spacing: 3px;
            margin-bottom: 24px;
        }

        .login-box input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--border);
            border-radius: 14px;
            color: var(--text-main);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }

        .login-box input:focus {
            border-color: var(--gold);
        }

        .login-box input::placeholder {
            color: var(--text-light);
        }

        .login-box button {
            padding: 12px 28px;
            margin: 10px 8px 0;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }

        .login-box button:hover {
            background: rgba(201, 168, 87, 0.08);
            border-color: var(--gold);
        }

        .tip {
            color: var(--danger);
            font-size: 13px;
            margin-top: 14px;
            height: 22px;
        }

        .main-content {
            display: none;
        }

        .hide {
            display: none !important;
        }
    </style>
</head>
<body>
    <div id="loginMask" class="login-mask">
        <div class="login-box">
            <div id="loginTitle"><h2>会员验证</h2></div>
            <input type="text" id="username" placeholder="请输入账号">
            <input type="password" id="pwd" placeholder="请输入密码">
            <p class="tip" id="msgTip"></p>
            <button onclick="doLogin()">登录</button>
            <button onclick="switchMode()">注册账号</button>
        </div>
    </div>

    <div class="main-content" id="mainBox">
        <div class="container">
            <!-- 顶部信息区 -->
            <div class="header-card">
                <div class="countdown" id="timer">活动倒计时加载中...</div>
                <img src="tx.JPG.JPG" alt="Avatar" class="avatar">
                <h1>个人中心</h1>
                <div class="sub-title">MEMBER AREA</div>
            </div>

            <!-- 功能按钮区 全屏网格布局 -->
            <div class="btn-wrap">
                <a href="about.html" class="btn">👤 个人资料</a>
                <a href="moments.html" class="btn">📸 动态分享</a>
                <a href="https://ngl.link/rene25528" class="btn" target="_blank">📝 留言板</a>
                <a href="https://163cn.tv/7SbEBgb" class="btn" target="_blank">🎵 音乐收藏</a>
                <a href="game.html" class="btn">🎮 休闲专区</a>
                <a href="chat.html" class="btn">🤖 智能助手</a>
                <a href="pay.html" class="btn btn-pay">💳 会员续费 / 升级</a>
            </div>

            <!-- 退出按钮 -->
            <button class="btn btn-logout" onclick="logout()">🚪 退出登录</button>
        </div>
    </div>

    <script>
        const needLogin = true;
        let isRegisterMode = false;

        const loginMask = document.getElementById('loginMask');
        const mainBox = document.getElementById('mainBox');
        const loginTitle = document.getElementById('loginTitle');
        const msgTip = document.getElementById('msgTip');

        window.onload = function(){
            updateTimer();
            setInterval(updateTimer, 1000);

            const loginStatus = localStorage.getItem("siteLogin");
            const userAccount = localStorage.getItem("regUser");
            const userPwd = localStorage.getItem("regPwd");

            if(!needLogin){
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
                return;
            }

            if(loginStatus === "ok" && userAccount && userPwd){
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
            }else{
                loginMask.classList.remove("hide");
                mainBox.style.display = "none";
            }
        };

        function switchMode(){
            msgTip.innerText = "";
            isRegisterMode = !isRegisterMode;
            if(isRegisterMode){
                loginTitle.innerHTML = "<h2>账号注册</h2>";
                document.querySelectorAll(".login-box button")[1].innerText = "返回登录";
            }else{
                loginTitle.innerHTML = "<h2>会员验证</h2>";
                document.querySelectorAll(".login-box button")[1].innerText = "注册账号";
            }
        }

        function doLogin(){
            const un = document.getElementById('username').value.trim();
            const pw = document.getElementById('pwd').value.trim();
            msgTip.innerText = "";

            if(!un || !pw){
                msgTip.innerText = "账号与密码不能为空";
                return;
            }

            const regUser = localStorage.getItem("regUser");
            const regPwd = localStorage.getItem("regPwd");

            if(isRegisterMode){
                if(regUser){
                    msgTip.innerText = "该账号已被注册";
                    return;
                }
                localStorage.setItem("regUser", un);
                localStorage.setItem("regPwd", pw);
                localStorage.setItem("siteLogin", "ok");
                loginMask.classList.add("hide");
                mainBox.style.display = "block";
            }else{
                if(un === regUser && pw === regPwd){
                    localStorage.setItem("siteLogin", "ok");
                    loginMask.classList.add("hide");
                    mainBox.style.display = "block";
                }else{
                    msgTip.innerText = "账号或密码错误";
                }
            }
        }

        function logout(){
            localStorage.removeItem("siteLogin");
            location.reload();
        }

        // 倒计时逻辑保留
        function updateTimer() {
            const targetDate = new Date("2026/08/24 00:00:00").getTime();
            const now = new Date().getTime();
            const difference = targetDate - now;
            if (difference <= 0) {
                document.getElementById('timer').innerHTML = "🎉 生日快乐 🎉";
                return;
            }
            const days = Math.floor(difference / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);
            document.getElementById('timer').innerHTML = `🎁 距离生日：${days}天 ${hours}时 ${minutes}分 ${seconds}秒`;
        }
    </script>
</body>
</html>
