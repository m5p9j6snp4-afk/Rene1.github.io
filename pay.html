<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員付費中心 | PRIVATE MEMBER</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --gold-primary: #d4af37;
            --gold-light: #f0d890;
            --gold-border: rgba(212, 175, 55, 0.25);
            --royal-black: #020205;
            --royal-dark: #0a0a12;
            --royal-gray: #16161f;
            --platinum: #e5e7eb;
            --ali-blue: #1677ff;
        }
        body {
            font-family: sans-serif;
            background-color: var(--royal-black);
            color: var(--platinum);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .page-title {
            font-size: 28px;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }
        .page-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 30px;
        }
        .package-wrap {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }
        .package-item {
            background: var(--royal-dark);
            border: 1px solid var(--gold-border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
        }
        .package-item.active {
            border-color: var(--gold-primary);
            background: #1c1913;
        }
        .package-name {
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 8px;
        }
        .package-price {
            font-size: 24px;
            color: var(--gold-primary);
            font-weight: 600;
        }
        .total-box {
            width: 100%;
            max-width: 500px;
            background: var(--royal-dark);
            border: 1px solid var(--gold-border);
            border-radius: 16px;
            padding: 18px;
            text-align: center;
            margin-bottom: 20px;
        }
        .total-money {
            font-size: 26px;
            color: var(--gold-primary);
            font-weight: 600;
        }
        .main-btn {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            font-size: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            cursor: pointer;
            border: none;
        }
        .ali-btn {
            background: #1677ff;
            color: #fff;
        }
        a {
            color: #aaa;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h2 class="page-title">會員付費中心</h2>
<p class="page-desc">點按支付 → 直接跳轉付款</p>

<div class="package-wrap">
    <div class="package-item" data-price="9990000" onclick="select(this)">👑 至尊終身會員 ¥999萬</div>
    <div class="package-item" data-price="1980000" onclick="select(this)">💎 鉑金年度會員 ¥198萬</div>
    <div class="package-item" data-price="398000" onclick="select(this)">🥇 黃金季度會員 ¥39.8萬</div>
</div>

<div class="total-box">
    <div>當前金額</div>
    <div class="total-money" id="total">¥ 0.00</div>
</div>

<!-- 支付按钮：点了直接跳你的支付宝链接 -->
<button class="main-btn ali-btn" onclick="goAliPay()">
   👉 點我直接支付（跳轉支付寶）
</button>

<a href="index.html">⬅️ 返回會員主頁</a>

<script>
let price = 0;
const aliLink = "https://qr.alipay.com/2m617357kt5fk2ebefycue2";

function select(el) {
    document.querySelectorAll('.package-item').forEach(i => i.classList.remove('active'));
    el.classList.add('active');
    price = el.dataset.price;
    document.getElementById('total').innerText = "¥ " + Number(price).toLocaleString();
}

// 核心：点击直接跳你的支付宝付款
function goAliPay() {
    if (price <= 0) {
        alert("請先選擇套餐");
        return;
    }
    // 直接打开支付宝付款链接
    window.open(aliLink, "_blank");
}
</script>
</body>
</html>
