<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會員付費中心 | PRIVATE MEMBER</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold-primary: #d4af37;
            --gold-light: #f0d890;
            --gold-border: rgba(212, 175, 55, 0.25);
            --royal-black: #020205;
            --royal-dark: #0a0a12;
            --royal-gray: #16161f;
            --platinum: #e5e7eb;
            --danger: #f87171;
            --success: #10b981;
            --wechat-green:#07C160;
        }

        body {
            font-family: "Noto Sans SC", "Montserrat", sans-serif;
            background-color: var(--royal-black);
            background-image: 
                radial-gradient(ellipse at 15% 20%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
                radial-gradient(ellipse at 85% 80%, rgba(158, 126, 34, 0.06) 0%, transparent 45%);
            color: var(--platinum);
            min-height: 100vh;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: pageFade 0.8s ease-out;
        }

        @keyframes pageFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes loading {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .page-title {
            font-size: 28px;
            color: var(--gold-primary);
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(212,175,55,0.2);
        }
        .page-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 35px;
            letter-spacing: 1px;
        }

        .package-wrap {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }
        .package-item {
            background: linear-gradient(145deg, var(--royal-dark), var(--royal-gray));
            border: 1px solid var(--gold-border);
            border-radius: 20px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .package-item:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 15px rgba(212,175,55,0.12);
        }
        .package-item.active {
            border-color: var(--gold-primary);
            background: linear-gradient(145deg, #1c1913, #2b261c);
        }
        .package-name {
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 8px;
        }
        .package-price {
            font-size: 24px;
            font-weight: 600;
            color: var(--gold-primary);
            margin: 10px 0;
        }
        .package-tip {
            font-size: 13px;
            opacity: 0.6;
            line-height: 1.5;
        }

        .total-box {
            width: 100%;
            max-width: 500px;
            background: var(--royal-dark);
            border: 1px solid var(--gold-border);
            border-radius: 16px;
            padding: 18px 22px;
            text-align: center;
            margin-bottom: 25px;
        }
        .total-text {
            font-size: 16px;
        }
        .total-money {
            font-size: 26px;
            color: var(--gold-primary);
            font-weight: 600;
            margin-top: 6px;
        }

        .main-btn {
            width: 100%;
            max-width: 500px;
            padding: 16px;
            font-size: 16px;
            letter-spacing: 2px;
            border-radius: 20px;
            border: 1px solid var(--gold-primary);
            background: linear-gradient(135deg, #4b3c1e, #8c6d2f);
            color: var(--gold-light);
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            margin-bottom:12px;
        }
        .wx-pay-btn{
            border:1px solid var(--wechat-green);
            background:linear-gradient(135deg,#059e4e,#07C160);
            color:#fff;
        }
        .main-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 36px rgba(0,0,0,0.5), 0 0 20px rgba(212,175,55,0.2);
        }
        .wx-pay-btn:hover{
            box-shadow:0 12px 36px rgba(0,0,0,0.5),0 0 20px rgba(7,193,96,0.25);
        }
        .back-link {
            color: var(--platinum);
            opacity: 0.6;
            text-decoration: none;
            font-size: 15px;
            margin-top: 10px;
            transition: 0.3s;
        }
        .back-link:hover {
            color: var(--gold-primary);
            opacity: 1;
        }

        .mask {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 15px;
        }
        .pop-box {
            width: 100%;
            max-width: 420px;
            background: linear-gradient(145deg, var(--royal-dark), var(--royal-gray));
            border: 1px solid var(--gold-border);
            border-radius: 24px;
            padding: 30px 25px;
            text-align: center;
            animation: popShow 0.4s ease;
        }
        @keyframes popShow {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .pop-title {
            font-size: 22px;
            color: var(--gold-primary);
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
        .pop-desc {
            font-size: 14px;
            opacity: 0.7;
            margin-bottom: 20px;
        }
        .pop-input {
            width: 100%;
            padding: 14px 18px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--gold-border);
            border-radius: 16px;
            color: var(--platinum);
            font-size: 15px;
            outline: none;
            transition: 0.3s;
        }
        .pop-input:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 4px rgba(212,175,55,0.1);
        }
        .row-input {
            display: flex;
            gap: 10px;
        }
        .row-input .pop-input {
            flex: 1;
        }
        .pop-btn-group {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }
        .pop-btn {
            flex: 1;
            padding: 13px;
            border-radius: 16px;
            border: none;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #4b3c1e, #8c6d2f);
            color: var(--gold-light);
            border: 1px solid var(--gold-primary);
        }
        .btn-cancel {
            background: transparent;
            color: var(--platinum);
            border: 1px solid var(--gold-border);
        }
        .loading-icon {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gold-border);
            border-top-color: var(--gold-primary);
            border-radius: 50%;
            margin: 20px auto;
            animation: loading 1s linear infinite;
        }
        .success-icon {
            font-size: 50px;
            color: var(--success);
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <h2 class="page-title">會員付費中心</h2>
    <p class="page-desc">頂級私享會員專屬通道 · 入會門檻 999萬</p>

    <div class="package-wrap">
        <div class="package-item" data-price="9990000" onclick="selectPackage(this)">
            <div class="package-name">👑 至尊終身會員</div>
            <div class="package-price">¥ 9,990,000</div>
            <div class="package-tip">永久享有全站最高權限、私人管家、獨立專屬通道</div>
        </div>
        <div class="package-item" data-price="1980000" onclick="selectPackage(this)">
            <div class="package-name">💎 鉑金年度會員</div>
            <div class="package-price">¥ 1,980,000</div>
            <div class="package-tip">全年尊享全部會員服務，優先體驗新功能</div>
        </div>
        <div class="package-item" data-price="398000" onclick="selectPackage(this)">
            <div class="package-name">🥇 黃金季度會員</div>
            <div class="package-price">¥ 398,000</div>
            <div class="package-tip">季度體驗頂級會員權益，靈活選擇</div>
        </div>
    </div>

    <div class="total-box">
        <div class="total-text">當前選定套餐</div>
        <div class="total-money" id="totalMoney">¥ 0.00</div>
    </div>

    <button class="main-btn" onclick="openPayPop()">立即信用卡結賬付款</button>
    <!-- 新增0.1元跳轉微信按鈕 -->
    <button class="main-btn wx-pay-btn" onclick="jumpWxPay()">微信測試付款 僅需 ¥0.10</button>

    <a href="index.html" class="back-link">⬅️ 返回會員主頁</a>

    <div class="mask" id="payMask">
        <div class="pop-box" id="payBox">
            <h3 class="pop-title">信用卡支付</h3>
            <p class="pop-desc">請填寫正確信用卡資料完成付款</p>
            
            <input type="text" class="pop-input" id="cardNum" placeholder="信用卡號碼 (16位純數字)">

            <div class="row-input">
                <input type="text" class="pop-input" id="expDate" placeholder="有效期 (格式: 月/年 例:12/27)">
                <input type="text" class="pop-input" id="cvv" placeholder="安全碼 CVV (3位數)">
            </div>

            <input type="password" class="pop-input" id="payPwd" placeholder="支付密碼 (6位純數字)">

            <div class="pop-btn-group">
                <button class="pop-btn btn-cancel" onclick="closeMask()">取消</button>
                <button class="pop-btn btn-confirm" onclick="submitPay()">確認支付</button>
            </div>
        </div>
    </div>

    <script>
        let selectPrice = 0;
        const totalMoney = document.getElementById('totalMoney');
        const payMask = document.getElementById('payMask');
        const payBox = document.getElementById('payBox');

        function selectPackage(el){
            document.querySelectorAll('.package-item').forEach(item=>{
                item.classList.remove('active');
            });
            el.classList.add('active');
            selectPrice = Number(el.dataset.price);
            totalMoney.innerText = "¥ " + selectPrice.toLocaleString();
        }

        function openPayPop(){
            if(selectPrice <= 0){
                alert("請先選擇對應會員套餐！");
                return;
            }
            payMask.style.display = "flex";
        }

        function closeMask(){
            payMask.style.display = "none";
        }

        function submitPay(){
            const cardNum = document.getElementById('cardNum').value.trim();
            const expDate = document.getElementById('expDate').value.trim();
            const cvv = document.getElementById('cvv').value.trim();
            const payPwd = document.getElementById('payPwd').value.trim();

            const regCard = /^\d{16}$/;
            if(!regCard.test(cardNum)){
                alert("信用卡號碼格式錯誤！請輸入16位純數字");
                return;
            }
            const regExp = /^(0[1-9]|1[0-2])\/\d{2}$/;
            if(!regExp.test(expDate)){
                alert("有效期格式錯誤！請使用 月/年 格式，例如：12/27");
                return;
            }
            const regCvv = /^\d{3}$/;
            if(!regCvv.test(cvv)){
                alert("安全碼CVV格式錯誤！請輸入3位純數字");
                return;
            }
            const regPwd = /^\d{6}$/;
            if(!regPwd.test(payPwd)){
                alert("支付密碼格式錯誤！請輸入6位純數字");
                return;
            }

            payBox.innerHTML = `
                <h3 class="pop-title">交易處理中</h3>
                <div class="loading-icon"></div>
                <p class="pop-desc">正在驗證信用卡資訊，請稍候...</p>
            `;

            setTimeout(()=>{
                payBox.innerHTML = `
                    <h3 class="pop-title">支付成功</h3>
                    <div class="success-icon">✓</div>
                    <p class="pop-desc">信用卡扣款完成，會員權益已開通</p>
                    <div class="pop-btn-group">
                        <button class="pop-btn btn-confirm" onclick="closeMask();location.href='index.html'">返回主頁</button>
                    </div>
                `;
            }, 2000);
        }

        // 0.1元喚起微信支付
        function jumpWxPay(){
            // 安卓/iPhone通用微信自帶付款鏈接，金額0.1
            const wxUrl = "weixin://wap/pay?amount=0.1&productname=會員測試體驗";
            window.location.href = wxUrl;wxp://f2f0S8CL2epi3fGrv27ojJwx3J4PtJDsLMi6Yz9i6PFuVPY
        }
    </script>
</body>
</html>
